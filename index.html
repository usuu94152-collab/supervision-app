<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>본교무실 감독표 – 대진고등학교</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;margin:0;}
select,input[type=text],input[type=password]{border:1px solid #d1d5db;border-radius:6px;padding:6px 10px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;}
select:focus,input:focus{outline:none;border-color:#185FA5;}
.btn{border:1px solid #d1d5db;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;background:#fff;color:#374151;font-family:inherit;transition:background .1s;}
.btn:hover{background:#f3f4f6;}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5;}
.btn.primary:hover{background:#1e4e8c;}
.btn.success{background:#15803d;color:#fff;border-color:#15803d;}
.btn.success:hover{background:#166534;}
.btn.ghost{background:transparent;border-color:#e5e7eb;color:#6b7280;}
.btn.ghost:hover{background:#f9fafb;}
.btn.sm{padding:4px 10px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;}
.b-normal{background:#dcfce7;color:#166534;}
.b-changed{background:#dbeafe;color:#1e40af;}
.b-excluded{background:#f3f4f6;color:#6b7280;}
.b-swap{background:#fce7f3;color:#9d174d;}
.b-auto{background:#dbeafe;color:#1e40af;}
.b-manual{background:#fef3c7;color:#92400e;}
.info-box{background:#eff6ff;color:#1e40af;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:.75rem;}
.warn-box{background:#fffbeb;color:#92400e;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:.75rem;border:1px solid #fde68a;}
.row-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
.sec-title{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;}
.overflow-x{overflow-x:auto;}

/* 탭 */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto;}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;white-space:nowrap;color:#6b7280;border:none;border-bottom:2px solid transparent;background:none;transition:color .15s;font-family:inherit;}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700;}
.tab:hover:not(.active){color:#111;background:#f9fafb;}
.tab.locked{color:#9ca3af;}
.tab.locked .lock-icon{font-size:10px;margin-left:3px;opacity:.7;}

/* 달력 공통 */
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;min-width:350px;}
.dow-hd{text-align:center;font-size:11px;font-weight:700;padding:6px 0;color:#9ca3af;}
.dow-hd.sat{color:#1d4ed8;}.dow-hd.sun{color:#b91c1c;}

/* 읽기 전용 달력 셀 */
.r-cell{min-height:72px;border-radius:7px;border:1px solid #e5e7eb;background:#fff;padding:5px 6px;}
.r-cell.empty{background:transparent;border-color:transparent;}
.r-cell.wknd{background:#f9fafb;opacity:.6;}
.r-cell.excl{background:#f3f4f6;opacity:.6;}
.r-cell.chng{border-color:#93c5fd;background:#eff6ff;}
.cell-d{font-size:11px;font-weight:600;color:#9ca3af;margin-bottom:3px;}
.cell-d.sat{color:#1d4ed8;}.cell-d.sun{color:#b91c1c;}
.cell-d.tod{background:#185FA5;color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
.cell-nm{font-size:12px;font-weight:700;color:#111;}
.cell-nm.ch{color:#1d4ed8;}

/* 배정 편집 달력 셀 */
.e-cell{border-radius:7px;border:1px solid #e5e7eb;background:#fff;padding:5px 6px;min-height:88px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none;}
.e-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.e-cell.wknd{background:#f9fafb;cursor:default;}
.e-cell.excl{background:#fef9c3;border-color:#fde047;}
.e-cell.excl:hover{background:#fef08a;}
.e-cell.normal:hover{border-color:#93c5fd;background:#f0f9ff;}
.e-cell select{width:100%;font-size:11px;padding:3px 4px;margin-top:4px;border:1px solid #d1d5db;border-radius:4px;background:#fff;cursor:pointer;}
.hint{font-size:9px;color:#9ca3af;margin-top:2px;}

/* 교체 달력 셀 */
.s-cell{border-radius:7px;border:1.5px solid #e5e7eb;background:#fff;padding:6px 7px;min-height:80px;cursor:pointer;transition:border-color .12s,background .12s,transform .1s;user-select:none;}
.s-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.s-cell.wknd{background:#f9fafb;border-color:#e5e7eb;opacity:.55;cursor:default;}
.s-cell.excl{background:#f3f4f6;border-color:#e5e7eb;opacity:.55;cursor:default;}

.s-cell.normal:hover{border-color:#93c5fd;background:#f0f9ff;transform:scale(1.02);}
.s-cell.sel-a{border-color:#185FA5!important;background:#dbeafe!important;box-shadow:0 0 0 3px #bfdbfe;}
.s-cell.sel-b{border-color:#15803d!important;background:#dcfce7!important;box-shadow:0 0 0 3px #bbf7d0;}
.s-cell.changed-cell{border-color:#93c5fd;background:#eff6ff;}

/* 단계 안내 바 */
.step-bar{display:flex;align-items:center;gap:12px;background:#f0f9ff;border:1px solid #bfdbfe;border-radius:8px;padding:.75rem 1rem;margin-bottom:.875rem;font-size:13px;flex-wrap:wrap;}
.step-chip{display:inline-flex;align-items:center;gap:6px;background:#185FA5;color:#fff;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;}
.step-chip.b{background:#15803d;}
.step-chip.empty-chip{background:#e5e7eb;color:#6b7280;}
.step-arrow{font-size:16px;color:#9ca3af;}

/* 비밀번호 잠금 화면 */
.lock-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:320px;padding:2rem;text-align:center;
}
.lock-icon-big{font-size:48px;margin-bottom:1rem;filter:grayscale(.3);}
.lock-title{font-size:16px;font-weight:700;color:#111;margin-bottom:.375rem;}
.lock-sub{font-size:13px;color:#6b7280;margin-bottom:1.5rem;}
.lock-input-wrap{position:relative;width:100%;max-width:260px;}
.lock-input-wrap input{width:100%;padding:10px 44px 10px 14px;font-size:15px;border:1.5px solid #d1d5db;border-radius:8px;letter-spacing:.2em;text-align:center;}
.lock-input-wrap input:focus{border-color:#185FA5;outline:none;}
.lock-input-wrap input.error{border-color:#b91c1c;animation:shake .3s ease;}
.show-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:#9ca3af;background:none;border:none;padding:0;}
.lock-btn{margin-top:.875rem;width:100%;max-width:260px;padding:10px;font-size:14px;font-weight:700;}
.lock-err{color:#b91c1c;font-size:12px;margin-top:.5rem;min-height:18px;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* 범례 */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1rem;font-size:12px;align-items:center;color:#374151;}
.leg{display:flex;align-items:center;gap:5px;}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}

/* 모달 */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.18);}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1rem;}
.swap-card{display:flex;border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;margin:1rem 0;}
.swap-half{flex:1;padding:.875rem 1rem;text-align:center;}
.swap-half.from{background:#dbeafe;border-right:1.5px solid #e5e7eb;}
.swap-half.to{background:#dcfce7;}
.swap-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:6px;}
.swap-date{font-size:11px;color:#6b7280;margin-bottom:2px;}
.swap-name{font-size:17px;font-weight:700;color:#111;margin-bottom:2px;}
.swap-dow{font-size:12px;color:#9ca3af;}
.swap-arrow-wrap{display:flex;align-items:center;justify-content:center;padding:.75rem;background:#f9fafb;border-top:1.5px solid #e5e7eb;border-bottom:1.5px solid #e5e7eb;font-size:13px;color:#6b7280;}
.reason-wrap{margin-top:.875rem;}
.reason-label{font-size:12px;color:#6b7280;margin-bottom:4px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}

/* 테이블 */
table{width:100%;border-collapse:collapse;font-size:13px;}

/* 토스트 */

</style>

<body>
<div style="max-width:960px;margin:0 auto;padding-bottom:3rem;">

  <!-- 헤더 -->
  <div style="background:#fff;border-bottom:1px solid #e5e7eb;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
    <div>
      <div style="font-size:15px;font-weight:700;">📋 본교무실 감독표</div>
      <div style="font-size:11px;color:#9ca3af;margin-top:1px;">대진고등학교</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:11px;color:#9ca3af;">작업자</span>
      <select id="currentUser" style="font-size:12px;padding:4px 8px;">
        <option value="">선택</option>
        <option>신현주</option><option>이용주</option><option>강성자</option>
        <option>유성욱</option><option>이다원</option><option>이애정</option><option>최진영</option>
      </select>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="schedule">월간 감독표</button>
    <button class="tab locked" data-tab="assign">월별 배정 <span class="lock-icon">🔒</span></button>
    <button class="tab" data-tab="swap">교체 관리</button>
    <button class="tab" data-tab="stats">월별 통계</button>
    <button class="tab" data-tab="logs">변경 로그</button>
  </div>

  <div id="page" style="padding:1rem;"></div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
//  ★ 비밀번호 설정 (여기서만 변경)
// ═══════════════════════════════════════
// 비밀번호: localStorage에 저장 (없으면 기본값 '1234')
function getStoredPW(){ return localStorage.getItem('supervision_pw')||'1234'; }
function setStoredPW(pw){ localStorage.setItem('supervision_pw',pw); }

// ═══════════════════════════════════════
//  상수
// ═══════════════════════════════════════
const TEACHERS=['신현주','이용주','강성자','유성욱','이다원','이애정','최진영'];
const DOW_KR=['일','월','화','수','목','금','토'];
const CONFIG={continueFromLastMonth:true,skipWeekends:true};

// ═══════════════════════════════════════
//  Store
// ═══════════════════════════════════════
const store={
  schedule:[],
  logs:[],
  holidays:[
    {date:'2026-04-14',type:'공휴일',  desc:'임시공휴일',  assign:'N'},
    {date:'2026-04-21',type:'시험기간',desc:'중간고사 1일',assign:'N'},
    {date:'2026-04-22',type:'시험기간',desc:'중간고사 2일',assign:'N'},
    {date:'2026-04-23',type:'시험기간',desc:'중간고사 3일',assign:'N'},
    {date:'2026-05-05',type:'공휴일',  desc:'어린이날',    assign:'N'},
    {date:'2026-06-06',type:'공휴일',  desc:'현충일',      assign:'N'},
  ],
  lastAssignIdx:0,
};

// 잠금 상태 (세션 내 유지 — 새로고침하면 다시 잠김)
let assignUnlocked=false;

// ═══════════════════════════════════════
//  유틸
// ═══════════════════════════════════════
const dim    =(y,m)=>new Date(y,m,0).getDate();
const dowOf  =(y,m,d)=>new Date(y,m-1,d).getDay();
const dowName=(y,m,d)=>DOW_KR[dowOf(y,m,d)];
const isWknd =(y,m,d)=>{const w=dowOf(y,m,d);return w===0||w===6;};
const fmt    =(y,m,d)=>`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const nowStr =()=>new Date().toLocaleString('ko-KR');
const getUser=()=>document.getElementById('currentUser')?.value||'미지정';
const isHol  =ds=>store.holidays.some(h=>h.date===ds&&h.assign==='N');
const holDesc=ds=>store.holidays.find(h=>h.date===ds)?.desc||'';

// ═══════════════════════════════════════
//  자동 배정
// ═══════════════════════════════════════
function autoAssign(y,m,userExcl=[],startIdx=0){
  const rows=[],total=dim(y,m);let idx=startIdx;
  for(let d=1;d<=total;d++){
    const ds=fmt(y,m,d),dow=dowName(y,m,d);
    const excl=(CONFIG.skipWeekends&&isWknd(y,m,d))||isHol(ds)||userExcl.includes(ds);
    if(excl){
      const note=isWknd(y,m,d)?'주말':holDesc(ds)||(userExcl.includes(ds)?'배정제외':'');
      rows.push({date:ds,year:y,month:m,day:d,dow,orig:null,current:null,status:'제외',type:'자동',note});
    } else {
      const t=TEACHERS[idx%TEACHERS.length];idx++;
      rows.push({date:ds,year:y,month:m,day:d,dow,orig:t,current:t,status:'정상',type:'자동',note:''});
    }
  }
  if(CONFIG.continueFromLastMonth)store.lastAssignIdx=idx%TEACHERS.length;
  return rows;
}

// ═══════════════════════════════════════
//  서비스
// ═══════════════════════════════════════
const svc={
  getSchedule:(y,m)=>store.schedule.filter(r=>r.year===y&&r.month===m),
  saveSchedule(rows,y,m,user){
    store.schedule=store.schedule.filter(r=>!(r.year===y&&r.month===m));
    store.schedule.push(...rows);
    store.logs.unshift({time:nowStr(),type:'월배정',target:`${y}-${String(m).padStart(2,'0')}`,prev:'',next:'배정완료',user,reason:'달력 배정 저장'});
  },
  swapByDate(dsA,dsB,reason,user){
    const rowA=store.schedule.find(r=>r.date===dsA);
    const rowB=store.schedule.find(r=>r.date===dsB);
    if(!rowA||!rowB)return{ok:false,msg:'데이터를 찾을 수 없습니다.'};
    if(rowA.status==='제외'||rowB.status==='제외')return{ok:false,msg:'배정 제외일은 교체할 수 없습니다.'};
    const tA=rowA.current,tB=rowB.current;
    if(tA===tB)return{ok:false,msg:'같은 감독자라 교체할 필요가 없습니다.'};
    rowA.current=tB;rowA.status='변경';rowA.type='교체';
    rowB.current=tA;rowB.status='변경';rowB.type='교체';
    store.logs.unshift({time:nowStr(),type:'교체',target:`${dsA}↔${dsB}`,prev:`${tA}/${tB}`,next:`${tB}/${tA}`,user,reason});
    return{ok:true};
  },
  getStats(y,m){
    const rows=store.schedule.filter(r=>r.year===y&&r.month===m&&r.status!=='제외');
    const s={};TEACHERS.forEach(t=>{s[t]={name:t,origCount:0,currCount:0,removed:0,added:0};});
    rows.forEach(r=>{
      if(r.orig)s[r.orig].origCount++;
      if(r.current)s[r.current].currCount++;
      if(r.orig&&r.current&&r.orig!==r.current){s[r.orig].removed++;s[r.current].added++;}
    });
    return Object.values(s);
  }
};

// ═══════════════════════════════════════
//  Toast / Modal
// ═══════════════════════════════════════
let _tt;
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show'+(err?' err':'');
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='toast',2800);
}
function showModal(html,onOk,onCancel){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="modal-overlay" id="ov">${html}</div>`;
  root.querySelector('#mOk')?.addEventListener('click',()=>{root.innerHTML='';onOk&&onOk();});
  root.querySelector('#mCancel')?.addEventListener('click',()=>{root.innerHTML='';onCancel&&onCancel();});
  root.querySelector('#ov')?.addEventListener('click',e=>{if(e.target.id==='ov'){root.innerHTML='';onCancel&&onCancel();}});
}

// ═══════════════════════════════════════
//  탭 라우터
// ═══════════════════════════════════════
let activeTab='schedule';
const st={
  schedule:{y:2026,m:4},
  assign:  {y:2026,m:4,rows:[],userExcl:[]},
  swap:    {y:2026,m:4,selA:null,selB:null},
  stats:   {y:2026,m:4},
};

document.getElementById('tabBar').addEventListener('click',e=>{
  const t=e.target.closest('[data-tab]');if(!t)return;
  const tab=t.dataset.tab;

  // 월별 배정 탭: 잠금 확인
  if(tab==='assign'&&!assignUnlocked){
    showLockModal();
    return;
  }

  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  activeTab=tab;
  render();
});

const render=()=>({schedule:P1,assign:P2,swap:P3,stats:P4,logs:P5}[activeTab])();
const yearSel=(id,v)=>`<select id="${id}" style="width:88px">${[2025,2026,2027].map(y=>`<option ${y===v?'selected':''}>${y}</option>`).join('')}</select>`;
const monSel =(id,v)=>`<select id="${id}" style="width:68px">${Array.from({length:12},(_,i)=>`<option value="${i+1}" ${i+1===v?'selected':''}>${i+1}월</option>`).join('')}</select>`;

// ═══════════════════════════════════════
//  비밀번호 잠금 모달
// ═══════════════════════════════════════
function showLockModal(){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`
  <div class="modal-overlay" id="ov">
    <div class="modal" style="max-width:340px;text-align:center;">
      <div style="font-size:40px;margin-bottom:.75rem;">🔒</div>
      <h3 style="margin-bottom:.375rem;">관리자 전용</h3>
      <p style="font-size:13px;color:#6b7280;margin-bottom:1.5rem;">월별 배정은 관리자만 사용할 수 있습니다.<br>비밀번호를 입력해주세요.</p>

      <div class="lock-input-wrap" style="margin:0 auto;">
        <input type="password" id="pwInput" placeholder="비밀번호" maxlength="20"
          style="width:100%;padding:10px 44px 10px 14px;font-size:15px;border:1.5px solid #d1d5db;border-radius:8px;letter-spacing:.15em;text-align:center;">
        <button class="show-pw" id="togglePw" title="비밀번호 표시">👁</button>
      </div>
      <div class="lock-err" id="pwErr" style="color:#b91c1c;font-size:12px;margin-top:.5rem;min-height:18px;"></div>

      <div style="display:flex;gap:8px;margin-top:1rem;">
        <button class="btn ghost" id="mCancel" style="flex:1">취소</button>
        <button class="btn primary" id="mOk" style="flex:1;font-weight:700;">확인</button>
      </div>
    </div>
  </div>`;

  const pwInput=root.querySelector('#pwInput');
  const pwErr  =root.querySelector('#pwErr');

  // 비밀번호 표시/숨김 토글
  root.querySelector('#togglePw').addEventListener('click',()=>{
    pwInput.type=pwInput.type==='password'?'text':'password';
  });

  // Enter 키
  pwInput.addEventListener('keydown',e=>{ if(e.key==='Enter') tryUnlock(); });

  // 자동 포커스
  setTimeout(()=>pwInput.focus(),80);

  function tryUnlock(){
    if(pwInput.value===getStoredPW()){
      assignUnlocked=true;
      root.innerHTML='';
      // 탭 전환
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelector('[data-tab="assign"]').classList.add('active');
      activeTab='assign';
      render();
    } else {
      pwErr.textContent='비밀번호가 올바르지 않습니다.';
      pwInput.classList.add('error');
      pwInput.value='';
      setTimeout(()=>pwInput.classList.remove('error'),400);
      pwInput.focus();
    }
  }

  root.querySelector('#mOk').addEventListener('click',tryUnlock);
  root.querySelector('#mCancel').addEventListener('click',()=>{ root.innerHTML=''; });
  root.querySelector('#ov').addEventListener('click',e=>{ if(e.target.id==='ov') root.innerHTML=''; });
}

// ═══════════════════════════════════════
//  P1 : 월간 감독표
// ═══════════════════════════════════════
function P1(){
  const s=st.schedule,rows=svc.getSchedule(s.y,s.m),today=new Date();
  let calBody='';
  if(!rows.length){
    calBody=`<div class="info-box">📌 해당 월 데이터가 없습니다. [월별 배정] 탭에서 먼저 배정을 생성해주세요.</div>`;
  } else {
    const fd=dowOf(s.y,s.m,1),total=dim(s.y,s.m),byD={};
    rows.forEach(r=>byD[r.date]=r);
    const isTod=d=>today.getFullYear()===s.y&&today.getMonth()===s.m-1&&today.getDate()===d;
    let g=DOW_KR.map((d,i)=>`<div class="dow-hd ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
    for(let i=0;i<fd;i++)g+=`<div class="r-cell empty"></div>`;
    for(let d=1;d<=total;d++){
      const ds=fmt(s.y,s.m,d),row=byD[ds],dw=dowOf(s.y,s.m,d);
      const sat=dw===6,sun=dw===0,excl=!row||row.status==='제외',chng=row?.status==='변경';
      let cls='r-cell';if(sat||sun)cls+=' wknd';else if(excl)cls+=' excl';else if(chng)cls+=' chng';
      const dd=isTod(d)?`<div class="cell-d"><span class="cell-d tod">${d}</span></div>`:`<div class="cell-d ${sat?'sat':sun?'sun':''}">${d}</div>`;
      let bd='';
      if(sat||sun)bd=`<div style="font-size:10px;color:#9ca3af;margin-top:2px;">주말</div>`;
      else if(excl)bd=`<span class="cell-tag b-excluded">${row?.note||'제외'}</span>`;
      else bd=`<div class="cell-nm ${chng?'ch':''}">${row.current||''}</div><span class="cell-tag ${chng?'b-changed':'b-normal'}">${chng?'변경':'정상'}</span>`;
      g+=`<div class="${cls}">${dd}${bd}</div>`;
    }
    calBody=`
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#dcfce7;border:1px solid #16a34a"></div>정상</div>
      <div class="leg"><div class="leg-dot" style="background:#dbeafe;border:1px solid #3b82f6"></div>변경됨</div>
      <div class="leg"><div class="leg-dot" style="background:#f3f4f6;border:1px solid #d1d5db"></div>배정 제외</div>
    </div>
    <div class="cal-wrap" id="printCal"><div class="cal-grid">${g}</div></div>`;
  }

  document.getElementById('page').innerHTML=`
  <div class="card">
    <div class="row-controls">
      ${yearSel('sc_y',s.y)}${monSel('sc_m',s.m)}
      <button class="btn sm" id="scL">조회</button>
      ${rows.length?`
      <div style="margin-left:auto;display:flex;gap:6px;">
        <button class="btn sm ghost" id="btnPrint">🖨️ 인쇄</button>
        <button class="btn sm ghost" id="btnDownload">⬇️ HTML 저장</button>
      </div>`:''}
    </div>
    ${calBody}
  </div>`;

  document.getElementById('scL')?.addEventListener('click',()=>{
    st.schedule.y=+document.getElementById('sc_y').value;
    st.schedule.m=+document.getElementById('sc_m').value;
    render();
  });

  // ── 인쇄 ──
  document.getElementById('btnPrint')?.addEventListener('click',()=>{
    printSchedule(s.y,s.m,rows);
  });

  // ── HTML 파일 저장 ──
  document.getElementById('btnDownload')?.addEventListener('click',()=>{
    downloadSchedule(s.y,s.m,rows);
  });
}

// ── 인쇄용 팝업 생성 ──
function printSchedule(y,m,rows){
  const html=buildPrintHTML(y,m,rows);
  const win=window.open('','_blank','width=900,height=700');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(()=>win.print(),400);
}

// ── HTML 파일 다운로드 ──
function downloadSchedule(y,m,rows){
  const html=buildPrintHTML(y,m,rows);
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`감독표_${y}년_${m}월.html`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`감독표_${y}년_${m}월.html 다운로드 완료`);
}

// ── 인쇄/다운로드용 HTML 생성 ──
function buildPrintHTML(y,m,rows){
  const byD={};rows.forEach(r=>byD[r.date]=r);
  const fd=dowOf(y,m,1),total=dim(y,m);

  let cells=DOW_KR.map((d,i)=>`<div class="dow-hd ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  for(let i=0;i<fd;i++)cells+=`<div class="cell empty"></div>`;

  for(let d=1;d<=total;d++){
    const ds=fmt(y,m,d),row=byD[ds],dw=dowOf(y,m,d);
    const sat=dw===6,sun=dw===0,excl=!row||row.status==='제외',chng=row?.status==='변경';
    let bg=excl?(sat||sun?'#f9fafb':'#f3f4f6'):chng?'#eff6ff':'#fff';
    let border=chng?'#93c5fd':'#e5e7eb';
    let nameColor=chng?'#1d4ed8':'#111';
    const dayColor=sat?'#1d4ed8':sun?'#b91c1c':'#9ca3af';
    let body='';
    if(sat||sun)body=`<div style="font-size:10px;color:#9ca3af;margin-top:3px;">주말</div>`;
    else if(excl)body=`<span style="font-size:10px;background:#f3f4f6;color:#6b7280;padding:1px 5px;border-radius:999px;">${row?.note||'제외'}</span>`;
    else body=`<div style="font-size:13px;font-weight:700;color:${nameColor};margin-top:3px;">${row.current||''}</div>
      <span style="font-size:10px;padding:1px 5px;border-radius:999px;${chng?'background:#dbeafe;color:#1e40af':'background:#dcfce7;color:#166534'}">${chng?'변경':'정상'}</span>`;

    cells+=`<div class="cell" style="background:${bg};border-color:${border};opacity:${(sat||sun||excl)?.6:1}">
      <div style="font-size:11px;font-weight:700;color:${dayColor};">${d}</div>
      ${body}
    </div>`;
  }

  return `<!DOCTYPE html><html lang="ko"><head>
<meta charset="UTF-8">
<title>감독표 ${y}년 ${m}월</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#fff;padding:24px;color:#111;}
  h1{font-size:18px;font-weight:700;margin-bottom:4px;}
  .sub{font-size:13px;color:#6b7280;margin-bottom:16px;}
  .legend{display:flex;gap:16px;margin-bottom:12px;font-size:12px;align-items:center;}
  .leg{display:flex;align-items:center;gap:5px;}
  .leg-dot{width:11px;height:11px;border-radius:3px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .dow-hd{text-align:center;font-size:11px;font-weight:700;padding:5px 0;color:#9ca3af;}
  .dow-hd.sat{color:#1d4ed8;}.dow-hd.sun{color:#b91c1c;}
  .cell{min-height:70px;border-radius:6px;border:1px solid #e5e7eb;padding:5px 6px;background:#fff;}
  .cell.empty{background:transparent;border-color:transparent;}
  .footer{margin-top:16px;font-size:11px;color:#9ca3af;text-align:right;}
  @media print{
    body{padding:8px;}
    @page{size:A4 landscape;margin:10mm;}
    .cell{min-height:60px;}
  }
</style>
</head><body>
<h1>📋 본교무실 감독표 · ${y}년 ${m}월</h1>
<div class="sub">대진고등학교 &nbsp;·&nbsp; 출력일: ${new Date().toLocaleDateString('ko-KR')}</div>
<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#dcfce7;border:1px solid #16a34a"></div>정상</div>
  <div class="leg"><div class="leg-dot" style="background:#dbeafe;border:1px solid #3b82f6"></div>변경됨</div>
  <div class="leg"><div class="leg-dot" style="background:#f3f4f6;border:1px solid #d1d5db"></div>배정 제외</div>
</div>
<div class="grid">${cells}</div>
<div class="footer">대진고등학교 본교무실 감독표 관리 시스템</div>
</body></html>`;
}

      <div style="display:flex;flex-direction:column;gap:10px;">
        <div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:4px;">현재 비밀번호</div>

      const t=TEACHERS[(store.lastAssignIdx+activeBefore)%TEACHERS.length];
      row.orig=t;row.current=t;row.status='정상';row.type='수동';row.note='';
      s.userExcl=s.userExcl.filter(x=>x!==ds);
    } else {
      row.orig=null;row.current=null;row.status='제외';row.type='자동';row.note='배정제외';
      if(!s.userExcl.includes(ds))s.userExcl.push(ds);
    }
    render();
  });
}

// ═══════════════════════════════════════
//  P3 : 교체 관리
// ═══════════════════════════════════════
function P3(){
  const s=st.swap;
  const allRows=svc.getSchedule(s.y,s.m);
  const byD={};allRows.forEach(r=>byD[r.date]=r);

  const stepA=s.selA?`<span class="step-chip">${s.selA.date} ${s.selA.dow} · ${s.selA.teacher}</span>`:`<span class="step-chip empty-chip">① 교체할 날짜 선택</span>`;
  const stepB=s.selB?`<span class="step-chip b">${s.selB.date} ${s.selB.dow} · ${s.selB.teacher}</span>`:`<span class="step-chip empty-chip">② 바꿀 날짜 선택</span>`;

  let grid='';
  if(!allRows.length){
    grid=`<div class="warn-box">해당 월 데이터가 없습니다. [월별 배정]에서 먼저 배정을 생성하세요.</div>`;
  } else {
    const fd=dowOf(s.y,s.m,1),total=dim(s.y,s.m);
    let g=DOW_KR.map((d,i)=>`<div class="dow-hd ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
    for(let i=0;i<fd;i++)g+=`<div class="s-cell empty"></div>`;
    for(let d=1;d<=total;d++){
      const ds=fmt(s.y,s.m,d),row=byD[ds],dw=dowOf(s.y,s.m,d);
      const sat=dw===6,sun=dw===0,isExcl=!row||row.status==='제외';
      const isSelA=s.selA?.date===ds,isSelB=s.selB?.date===ds,isChng=row?.status==='변경';
      const dd=`<div class="cell-d ${sat?'sat':sun?'sun':''}">${d}</div>`;
      if(sat||sun){g+=`<div class="s-cell wknd">${dd}<div style="font-size:10px;color:#9ca3af;margin-top:2px;">주말</div></div>`;continue;}
      if(isExcl){g+=`<div class="s-cell excl">${dd}<span class="cell-tag b-excluded">${row?.note||'제외'}</span></div>`;continue;}
      let cls='s-cell normal';
      if(isSelA)cls='s-cell sel-a';else if(isSelB)cls='s-cell sel-b';else if(isChng)cls='s-cell normal changed-cell';
      const nc=isSelA?'color:#1e40af;':isSelB?'color:#166534;':isChng?'color:#1d4ed8;':'color:#111;';
      const tag=isSelA?`<span class="cell-tag b-changed" style="margin-top:2px;">① 선택됨</span>`:isSelB?`<span class="cell-tag b-normal" style="margin-top:2px;">② 선택됨</span>`:isChng?`<span class="cell-tag b-changed" style="margin-top:2px;">변경됨</span>`:'';
      g+=`<div class="${cls}" data-ds="${ds}">${dd}<div style="font-size:12px;font-weight:700;margin-top:2px;${nc}">${row.current||''}</div>${tag}</div>`;
    }
    grid=`<div class="cal-wrap"><div class="cal-grid" id="swGrid">${g}</div></div>`;
  }

  document.getElementById('page').innerHTML=`
  <div class="card">
    <div class="row-controls">
      ${yearSel('sw_y',s.y)}${monSel('sw_m',s.m)}
      <button class="btn sm ghost" id="swReset">선택 초기화</button>
    </div>
    <div class="step-bar">
      ${stepA}<span class="step-arrow">⇄</span>${stepB}
      ${s.selA&&s.selB?`<button class="btn sm primary" id="btnConfirmSwap" style="margin-left:auto">교체 확인</button>`:''}
    </div>
    <div class="legend" style="margin-bottom:.75rem">
      <div class="leg"><div class="leg-dot" style="background:#dbeafe;border:1.5px solid #185FA5"></div>① 선택</div>
      <div class="leg"><div class="leg-dot" style="background:#dcfce7;border:1.5px solid #15803d"></div>② 선택</div>
      <div class="leg"><div class="leg-dot" style="background:#eff6ff;border:1px solid #93c5fd"></div>이미 변경됨</div>
      <div class="leg" style="font-size:11px;color:#9ca3af;">배정일을 차례로 클릭해서 교체할 두 날짜를 선택하세요</div>
    </div>
    ${grid}
  </div>`;

  document.getElementById('sw_y')?.addEventListener('change',e=>{s.y=+e.target.value;s.selA=null;s.selB=null;render();});
  document.getElementById('sw_m')?.addEventListener('change',e=>{s.m=+e.target.value;s.selA=null;s.selB=null;render();});
  document.getElementById('swReset')?.addEventListener('click',()=>{s.selA=null;s.selB=null;render();});

  document.getElementById('swGrid')?.addEventListener('click',e=>{
    const cell=e.target.closest('[data-ds]');if(!cell)return;
    const ds=cell.dataset.ds,row=byD[ds];
    if(!row||row.status==='제외')return;
    if(!s.selA){s.selA={date:ds,teacher:row.current,dow:row.dow};s.selB=null;}
    else if(s.selA.date===ds){s.selA=null;s.selB=null;}
    else if(!s.selB){
      s.selB={date:ds,teacher:row.current,dow:row.dow};
      if(s.selA.teacher===s.selB.teacher){toast('두 날짜의 감독자가 같아 교체할 필요가 없습니다.',true);s.selB=null;return;}
    } else {s.selA={date:ds,teacher:row.current,dow:row.dow};s.selB=null;}
    render();
  });

  document.getElementById('btnConfirmSwap')?.addEventListener('click',()=>{
    if(!s.selA||!s.selB)return;
    const A=s.selA,B=s.selB;
    showModal(`<div class="modal">
      <h3>🔄 감독 교체 확인</h3>
      <div class="swap-card">
        <div class="swap-half from">
          <div class="swap-label">① 날짜</div>
          <div class="swap-date">${A.date}</div>
          <div class="swap-name">${A.teacher}</div>
          <div class="swap-dow">${A.dow}요일</div>
        </div>
        <div class="swap-half to">
          <div class="swap-label">② 날짜</div>
          <div class="swap-date">${B.date}</div>
          <div class="swap-name">${B.teacher}</div>
          <div class="swap-dow">${B.dow}요일</div>
        </div>
      </div>
      <div class="swap-arrow-wrap">⇄ 두 날짜의 감독자를 서로 맞바꿉니다</div>
      <div class="reason-wrap">
        <div class="reason-label">교체 사유 (선택)</div>
        <input type="text" id="swapReason" placeholder="예: 출장, 연수 등" style="width:100%">
      </div>
      <div class="modal-btns">
        <button class="btn ghost" id="mCancel">취소</button>
        <button class="btn primary" id="mOk">교체 확정</button>
      </div>
    </div>`,()=>{
      const reason=document.getElementById('swapReason')?.value||'';
      const res=svc.swapByDate(A.date,B.date,reason,getUser());
      if(res.ok){toast('교체가 완료되었습니다. 변경 내용이 기록되었습니다.');s.selA=null;s.selB=null;render();}
      else toast(res.msg,true);
    });
  });
}

// ═══════════════════════════════════════
//  P4 : 월별 통계
// ═══════════════════════════════════════
function P4(){
  const s=st.stats,rows=svc.getSchedule(s.y,s.m).filter(r=>r.status!=='제외'),stats=svc.getStats(s.y,s.m);
  document.getElementById('page').innerHTML=`
  <div class="card">
    <div class="row-controls">${yearSel('st_y',s.y)}${monSel('st_m',s.m)}<button class="btn sm" id="stL">조회</button></div>
    ${!rows.length?`<div class="info-box">해당 월 데이터가 없습니다.</div>`:`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.25rem">
      ${[['총 배정 일수',rows.length+'일'],['교체 발생',rows.filter(r=>r.status==='변경').length+'건'],['감독 인원',TEACHERS.length+'명']]
        .map(([l,v])=>`<div style="background:#f9fafb;border-radius:8px;padding:.875rem"><div style="font-size:11px;color:#9ca3af;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">${l}</div><div style="font-size:24px;font-weight:700">${v}</div></div>`).join('')}
    </div>
    <div class="overflow-x"><table>
      <thead><tr><th>이름</th><th>원래 배정</th><th>현재 배정</th><th>빠진 횟수</th><th>추가 횟수</th><th>차이</th></tr></thead>
      <tbody>${stats.map(r=>{const d=r.currCount-r.origCount;return`<tr>
        <td style="font-weight:700">${r.name}</td><td>${r.origCount}</td><td style="font-weight:600">${r.currCount}</td>
        <td style="color:${r.removed?'#b91c1c':'#9ca3af'}">${r.removed}</td>
        <td style="color:${r.added?'#15803d':'#9ca3af'}">${r.added}</td>
        <td style="font-weight:700;color:${d>0?'#15803d':d<0?'#b91c1c':'#9ca3af'}">${d>0?'+':''}${d}</td>
      </tr>`;}).join('')}</tbody>
    </table></div>`}
  </div>`;
  document.getElementById('stL')?.addEventListener('click',()=>{st.stats.y=+document.getElementById('st_y').value;st.stats.m=+document.getElementById('st_m').value;render();});
}

// ═══════════════════════════════════════
//  P5 : 변경 로그
// ═══════════════════════════════════════
function P5(){
  const logs=store.logs;
  document.getElementById('page').innerHTML=`
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem">
      <div style="font-weight:700;font-size:14px">변경 이력</div>
      <span style="font-size:11px;color:#9ca3af">총 ${logs.length}건</span>
    </div>
    ${!logs.length?`<div class="info-box">변경 이력이 없습니다.</div>`:`
    <div class="overflow-x"><table>
      <thead><tr><th>변경시간</th><th>유형</th><th>대상</th><th class="hide-m">이전값</th><th>새값</th><th class="hide-m">작업자</th><th class="hide-m">사유</th></tr></thead>
      <tbody>${logs.map(l=>`<tr>
        <td style="font-size:11px;white-space:nowrap;color:#6b7280">${l.time}</td>
        <td><span class="badge b-${l.type==='교체'?'swap':l.type==='월배정'?'auto':'manual'}">${l.type}</span></td>
        <td style="font-size:12px">${l.target}</td>
        <td class="hide-m" style="color:#9ca3af">${l.prev||'–'}</td>
        <td style="font-weight:600">${l.next}</td>
        <td class="hide-m" style="font-size:12px">${l.user}</td>
        <td class="hide-m" style="color:#9ca3af;font-size:12px">${l.reason||'–'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>`;
}

render();
</script>
</body>
</html>
