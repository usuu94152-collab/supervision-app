<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;margin:0;}
select,input[type=text],input[type=password]{border:1px solid #d1d5db;border-radius:6px;padding:6px 10px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;}
select:focus,input:focus{outline:none;border-color:#185FA5;}
.btn{border:1px solid #d1d5db;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;background:#fff;color:#374151;font-family:inherit;transition:background .1s;}

.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;}

.warn-box{background:#fffbeb;color:#92400e;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:.75rem;border:1px solid #fde68a;}

.row-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}

.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

.dow-hd{text-align:center;font-size:11px;font-weight:700;padding:6px 0;color:#9ca3af;}
.dow-hd.sat{color:#1d4ed8;}.dow-hd.sun{color:#b91c1c;}
.r-cell{min-height:72px;border-radius:7px;border:1px solid #e5e7eb;background:#fff;padding:5px 6px;}
.r-cell.empty{background:transparent;border-color:transparent;}
.r-cell.wknd{background:#f9fafb;opacity:.6;}
.r-cell.excl{background:#f3f4f6;opacity:.6;}
.r-cell.chng{border-color:#93c5fd;background:#eff6ff;}
.cell-d{font-size:11px;font-weight:600;color:#9ca3af;margin-bottom:3px;}
.cell-d.sat{color:#1d4ed8;}.cell-d.sun{color:#b91c1c;}
.cell-d.tod{background:#185FA5;color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
.cell-nm{font-size:12px;font-weight:700;color:#111;}
.cell-nm.ch{color:#1d4ed8;}
.cell-tag{font-size:10px;margin-top:2px;padding:1px 5px;border-radius:999px;display:inline-block;}
.e-cell{border-radius:7px;border:1px solid #e5e7eb;background:#fff;padding:5px 6px;min-height:88px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none;}
.e-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.e-cell.wknd{background:#f9fafb;cursor:default;}
.e-cell.excl{background:#fef9c3;border-color:#fde047;}

.s-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.s-cell.wknd{background:#f9fafb;opacity:.55;cursor:default;}

.s-cell.normal:hover{border-color:#93c5fd;background:#f0f9ff;transform:scale(1.02);}
.s-cell.sel-a{border-color:#185FA5!important;background:#dbeafe!important;box-shadow:0 0 0 3px #bfdbfe;}
.s-cell.sel-b{border-color:#15803d!important;background:#dcfce7!important;box-shadow:0 0 0 3px #bbf7d0;}
.s-cell.changed-cell{border-color:#93c5fd;background:#eff6ff;}
.step-bar{display:flex;align-items:center;gap:12px;background:#f0f9ff;border:1px solid #bfdbfe;border-radius:8px;padding:.75rem 1rem;margin-bottom:.875rem;flex-wrap:wrap;}
.step-chip{display:inline-flex;align-items:center;gap:6px;background:#185FA5;color:#fff;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;}
.step-chip.b{background:#15803d;}
.step-chip.empty-chip{background:#e5e7eb;color:#6b7280;}
.step-arrow{font-size:16px;color:#9ca3af;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.18);}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1rem;}
.swap-card{display:flex;border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;margin:1rem 0;}
.swap-half{flex:1;padding:.875rem 1rem;text-align:center;}
.swap-half.from{background:#dbeafe;border-right:1.5px solid #e5e7eb;}
.swap-half.to{background:#dcfce7;}
.swap-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:6px;}
.swap-date{font-size:11px;color:#6b7280;margin-bottom:2px;}
.swap-name{font-size:17px;font-weight:700;color:#111;margin-bottom:2px;}
.swap-dow{font-size:12px;color:#9ca3af;}
.swap-arrow-wrap{display:flex;align-items:center;justify-content:center;padding:.75rem;background:#f9fafb;border-top:1.5px solid #e5e7eb;border-bottom:1.5px solid #e5e7eb;font-size:13px;color:#6b7280;}
.reason-wrap{margin-top:.875rem;}
.reason-label{font-size:12px;color:#6b7280;margin-bottom:4px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;font-weight:700;font-size:11px;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1rem;font-size:12px;align-items:center;color:#374151;}
.leg{display:flex;align-items:center;gap:5px;}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#15803d;color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;font-weight:600;z-index:200;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15);}
.toast.show{opacity:1;}
.toast.err{background:#b91c1c;}
.loading{text-align:center;padding:3rem;color:#9ca3af;font-size:14px;}
@media(max-width:600px){
  .card{padding:.875rem;}
  .row-controls{flex-direction:column;align-items:stretch;}
  .hide-m{display:none!important;}
  th,td{padding:6px 8px;font-size:12px;}
}
</style>
</head>
<body>
<div style="max-width:960px;margin:0 auto;padding-bottom:3rem;">
  <div style="background:#fff;border-bottom:1px solid #e5e7eb;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
    <div>
      <div style="font-size:15px;font-weight:700;">📋 본교무실 감독표</div>
      <div style="font-size:11px;color:#9ca3af;margin-top:1px;">대진고등학교</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:11px;color:#9ca3af;">작업자</span>
      <select id="currentUser" style="font-size:12px;padding:4px 8px;">
        <option value="">선택</option>
        <option>신현주</option><option>이용주</option><option>강성자</option>
        <option>유성욱</option><option>이다원</option><option>이애정</option><option>최진영</option>
      </select>
    </div>
  </div>
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="schedule">월간 감독표</button>
    <button class="tab" data-tab="assign">월별 배정 🔒</button>
    <button class="tab" data-tab="swap">교체 관리</button>
    <button class="tab" data-tab="stats">월별 통계</button>
    <button class="tab" data-tab="logs">변경 로그</button>
  </div>
  <div id="page" style="padding:1rem;"></div>
</div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  설정
// ══════════════════════════════════════════════════════
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxCtkcYnh1MKB0LWjfye2M7XrTVYHyl0uFUaAMpRk6Mdw6BjJuWZDDoOHNiCcKObyUiCw/exec';

function getStoredPW(){ return localStorage.getItem('supervision_pw')||'1234'; }
function setStoredPW(pw){ localStorage.setItem('supervision_pw',pw); }

// ══════════════════════════════════════════════════════
//  JSONP 호출 (CORS 완전 우회)
//  GAS는 fetch()로 호출하면 CORS에 막힘
//  script 태그로 호출하면 CORS 없이 동작
// ══════════════════════════════════════════════════════
var _cbIdx = 0;
function callGAS(action, params) {
  return new Promise(function(resolve) {
    var cbName = '__gasCb' + (++_cbIdx);
    var timeout = setTimeout(function(){
      delete window[cbName];
      var s = document.getElementById(cbName);
      if(s) s.parentNode.removeChild(s);
      resolve(null);
    }, 15000);

    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      var s = document.getElementById(cbName);
      if(s) s.parentNode.removeChild(s);
      resolve(data);
    };

    var url = GAS_URL + '?callback=' + cbName + '&action=' + encodeURIComponent(action);
    if(params) {
      Object.keys(params).forEach(function(k){
        var v = params[k];
        url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(
          typeof v === 'object' ? JSON.stringify(v) : String(v)
        );
      });
    }

    var s = document.createElement('script');
    s.id  = cbName;
    s.src = url;
    s.onerror = function(){
      clearTimeout(timeout);
      delete window[cbName];
      resolve(null);
    };
    document.head.appendChild(s);
  });
}

// ══════════════════════════════════════════════════════
//  상수
// ══════════════════════════════════════════════════════
var TEACHERS = ['신현주','이용주','강성자','유성욱','이다원','이애정','최진영'];
var DOW_KR   = ['일','월','화','수','목','금','토'];
var CONFIG   = { continueFromLastMonth:true, skipWeekends:true };

var store = {
  assignRows:    [],
  userExcl:      [],
  lastAssignIdx: 0,
  holidays: [
    {date:'2026-04-14',type:'공휴일',  desc:'임시공휴일',  assign:'N'},
    {date:'2026-04-21',type:'시험기간',desc:'중간고사 1일',assign:'N'},
    {date:'2026-04-22',type:'시험기간',desc:'중간고사 2일',assign:'N'},
    {date:'2026-04-23',type:'시험기간',desc:'중간고사 3일',assign:'N'},
    {date:'2026-05-05',type:'공휴일',  desc:'어린이날',    assign:'N'},
    {date:'2026-06-06',type:'공휴일',  desc:'현충일',      assign:'N'},
  ],
};
var assignUnlocked = false;

// ══════════════════════════════════════════════════════
//  유틸
// ══════════════════════════════════════════════════════
function dim(y,m)      { return new Date(y,m,0).getDate(); }
function dowOf(y,m,d)  { return new Date(y,m-1,d).getDay(); }
function dowName(y,m,d){ return DOW_KR[dowOf(y,m,d)]; }
function isWknd(y,m,d) { var w=dowOf(y,m,d); return w===0||w===6; }
function fmt(y,m,d)    { return y+'-'+pad(m)+'-'+pad(d); }
function pad(n)        { return String(n).padStart(2,'0'); }
function getUser()     { return document.getElementById('currentUser').value||'미지정'; }
function isHol(ds)     { return store.holidays.some(function(h){return h.date===ds&&h.assign==='N';}); }
function holDesc(ds)   { var h=store.holidays.find(function(h){return h.date===ds;}); return h?h.desc:''; }

// ══════════════════════════════════════════════════════
//  서비스
// ══════════════════════════════════════════════════════
var svc = {

  async getSchedule(y, m) {
    var raw = await callGAS('getSchedule');
    if(!raw || !Array.isArray(raw)) return [];
    return raw
      .map(function(r){
        return {
          date:    String(r['날짜']||''),
          year:    Number(r['연도']||0),
          month:   Number(r['월']||0),
          day:     Number(String(r['날짜']||'').split('-')[2]||0),
          dow:     String(r['요일']||''),
          orig:    r['원래감독']||null,
          current: r['현재감독']||null,
          status:  String(r['상태']||''),
          type:    String(r['배정구분']||''),
          note:    String(r['비고']||'')
        };
      })
      .filter(function(r){ return r.year===y && r.month===m; });
  },

  async saveSchedule(rows, y, m, user) {
    var res = await callGAS('saveSchedule', {rows:rows, year:y, month:m, user:user});
    return res && res.ok;
  },

  async swapByDate(dateA, dateB, reason, user) {
    var res = await callGAS('swapByDate', {dateA:dateA, dateB:dateB, reason:reason, user:user});
    if(!res) return {ok:false, msg:'서버 응답 없음'};
    return res;
  },

  async getLogs() {
    var raw = await callGAS('getLogs');
    if(!raw || !Array.isArray(raw)) return [];
    return raw.map(function(r){
      return {
        time:   String(r['변경시간']||''),
        type:   String(r['작업유형']||''),
        target: String(r['날짜또는대상월']||''),
        prev:   String(r['이전값']||''),
        next:   String(r['새값']||''),
        user:   String(r['작업자']||''),
        reason: String(r['사유']||'')
      };
    });
  },

  async loadHolidays() {
    var raw = await callGAS('getHolidays');
    if(raw && Array.isArray(raw) && raw.length) {
      store.holidays = raw.map(function(r){
        return {date:String(r['날짜']||''),type:String(r['유형']||''),desc:String(r['설명']||''),assign:String(r['배정여부']||'Y')};
      });
    }
  },

  getStats(rows) {
    var s={};
    TEACHERS.forEach(function(t){ s[t]={name:t,origCount:0,currCount:0,removed:0,added:0}; });
    rows.forEach(function(r){
      if(r.orig    && s[r.orig])    s[r.orig].origCount++;
      if(r.current && s[r.current]) s[r.current].currCount++;
      if(r.orig && r.current && r.orig!==r.current){
        if(s[r.orig])    s[r.orig].removed++;
        if(s[r.current]) s[r.current].added++;
      }
    });
    return Object.values(s);
  }
};

// ══════════════════════════════════════════════════════
//  자동 배정
// ══════════════════════════════════════════════════════
function autoAssign(y, m, userExcl, startIdx) {
  userExcl = userExcl||[]; startIdx = startIdx||0;
  var rows=[], total=dim(y,m), idx=startIdx;
  for(var d=1;d<=total;d++){
    var ds=fmt(y,m,d), dow=dowName(y,m,d);
    var excl=(CONFIG.skipWeekends&&isWknd(y,m,d))||isHol(ds)||userExcl.indexOf(ds)>=0;
    if(excl){
      var note=isWknd(y,m,d)?'주말':(holDesc(ds)||(userExcl.indexOf(ds)>=0?'배정제외':''));
      rows.push({date:ds,year:y,month:m,day:d,dow:dow,orig:null,current:null,status:'제외',type:'자동',note:note});
    } else {
      var t=TEACHERS[idx%TEACHERS.length]; idx++;
      rows.push({date:ds,year:y,month:m,day:d,dow:dow,orig:t,current:t,status:'정상',type:'자동',note:''});
    }
  }
  store.lastAssignIdx=idx%TEACHERS.length;
  return rows;
}

// ══════════════════════════════════════════════════════
//  Toast / Modal / Loading
// ══════════════════════════════════════════════════════
var _tt;
function toast(msg,err){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(err?' err':'');
  clearTimeout(_tt); _tt=setTimeout(function(){el.className='toast';},3000);
}
function showModal(html,onOk,onCancel){
  var root=document.getElementById('modalRoot');
  root.innerHTML='<div class="modal-overlay" id="ov">'+html+'</div>';
  var ok=root.querySelector('#mOk'), can=root.querySelector('#mCancel'), ov=root.querySelector('#ov');
  if(ok)  ok.addEventListener('click',  function(){root.innerHTML='';if(onOk)onOk();});
  if(can) can.addEventListener('click', function(){root.innerHTML='';if(onCancel)onCancel();});
  if(ov)  ov.addEventListener('click',  function(e){if(e.target.id==='ov'){root.innerHTML='';if(onCancel)onCancel();}});
}
function showLoading(){
  document.getElementById('page').innerHTML='<div class="loading">⏳ 데이터를 불러오는 중...</div>';
}

// ══════════════════════════════════════════════════════
//  탭 라우터
// ══════════════════════════════════════════════════════
var activeTab='schedule';
var st={schedule:{y:2026,m:4},assign:{y:2026,m:4},swap:{y:2026,m:4,selA:null,selB:null},stats:{y:2026,m:4}};

document.getElementById('tabBar').addEventListener('click',function(e){
  var t=e.target.closest('[data-tab]'); if(!t) return;
  var tab=t.dataset.tab;
  if(tab==='assign'&&!assignUnlocked){showLockModal();return;}
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  t.classList.add('active'); activeTab=tab; render();
});
function render(){ ({schedule:P1,assign:P2,swap:P3,stats:P4,logs:P5})[activeTab](); }

function yearSel(id,v){
  return '<select id="'+id+'" style="width:88px">'+[2025,2026,2027].map(function(y){return'<option'+(y===v?' selected':'')+'>'+y+'</option>';}).join('')+'</select>';
}
function monSel(id,v){
  return '<select id="'+id+'" style="width:68px">'+Array.from({length:12},function(_,i){
    return '<option value="'+(i+1)+'"'+(i+1===v?' selected':'')+'>'+(i+1)+'월</option>';
  }).join('')+'</select>';
}

// ══════════════════════════════════════════════════════
//  잠금 모달
// ══════════════════════════════════════════════════════
function showLockModal(){
  var root=document.getElementById('modalRoot');
  root.innerHTML='<div class="modal-overlay" id="ov"><div class="modal" style="max-width:340px;text-align:center;"><div style="font-size:40px;margin-bottom:.75rem;">🔒</div><h3>관리자 전용</h3><p style="font-size:13px;color:#6b7280;margin-bottom:1.5rem;">비밀번호를 입력해주세요.</p><div style="position:relative;width:100%;max-width:260px;margin:0 auto;"><input type="password" id="pwInput" placeholder="비밀번호" style="width:100%;padding:10px 44px 10px 14px;font-size:15px;border:1.5px solid #d1d5db;border-radius:8px;text-align:center;"><button id="togglePw" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:#9ca3af;">👁</button></div><div id="pwErr" style="color:#b91c1c;font-size:12px;margin-top:.5rem;min-height:18px;"></div><div style="display:flex;gap:8px;margin-top:1rem;"><button class="btn ghost" id="lCan" style="flex:1">취소</button><button class="btn primary" id="lOk" style="flex:1;font-weight:700;">확인</button></div></div></div>';
  var inp=root.querySelector('#pwInput'),err=root.querySelector('#pwErr');
  root.querySelector('#togglePw').addEventListener('click',function(){inp.type=inp.type==='password'?'text':'password';});
  setTimeout(function(){inp.focus();},80);
  function tryUnlock(){
    if(inp.value===getStoredPW()){
      assignUnlocked=true; root.innerHTML='';
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
      document.querySelector('[data-tab="assign"]').classList.add('active');
      activeTab='assign'; render();
    } else {err.textContent='비밀번호가 올바르지 않습니다.';inp.value='';inp.focus();}
  }
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')tryUnlock();});
  root.querySelector('#lOk').addEventListener('click',tryUnlock);
  root.querySelector('#lCan').addEventListener('click',function(){root.innerHTML='';});
  root.querySelector('#ov').addEventListener('click',function(e){if(e.target.id==='ov')root.innerHTML='';});
}

// ══════════════════════════════════════════════════════

async function P1(){
  var s=st.schedule; showLoading();

  var today=new Date();
  var calBody='';

  if(!rows.length){
    calBody='<div class="info-box">📌 해당 월 데이터가 없습니다. [월별 배정] 탭에서 먼저 배정을 생성해주세요.</div>';
  } else {
    var fd=dowOf(s.y,s.m,1),total=dim(s.y,s.m),byD={};
    rows.forEach(function(r){byD[r.date]=r;});
    var g=DOW_KR.map(function(d,i){return'<div class="dow-hd '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>';}).join('');
    for(var i=0;i<fd;i++) g+='<div class="r-cell empty"></div>';
    for(var d=1;d<=total;d++){
      var ds=fmt(s.y,s.m,d),row=byD[ds],dw=dowOf(s.y,s.m,d);
      var sat=dw===6,sun=dw===0,excl=!row||row.status==='제외',chng=row&&row.status==='변경';
      var cls='r-cell'; if(sat||sun)cls+=' wknd'; else if(excl)cls+=' excl'; else if(chng)cls+=' chng';
      var isTod=(today.getFullYear()===s.y&&today.getMonth()===s.m-1&&today.getDate()===d);
      var dd=isTod?'<div class="cell-d"><span class="cell-d tod">'+d+'</span></div>':'<div class="cell-d '+(sat?'sat':sun?'sun':'')+'">'+d+'</div>';
      var bd='';
      if(sat||sun) bd='<div style="font-size:10px;color:#9ca3af;margin-top:2px;">주말</div>';
      else if(excl) bd='<span class="cell-tag b-excluded">'+(row&&row.note?row.note:'제외')+'</span>';
      else bd='<div class="cell-nm '+(chng?'ch':'')+'">'+row.current+'</div><span class="cell-tag '+(chng?'b-changed':'b-normal')+'">'+(chng?'변경':'정상')+'</span>';
      g+='<div class="'+cls+'">'+dd+bd+'</div>';
    }
    calBody='<div class="legend"><div class="leg"><div class="leg-dot" style="background:#dcfce7;border:1px solid #16a34a"></div>정상</div><div class="leg"><div class="leg-dot" style="background:#dbeafe;border:1px solid #3b82f6"></div>변경됨</div><div class="leg"><div class="leg-dot" style="background:#f3f4f6;border:1px solid #d1d5db"></div>배정 제외</div></div><div class="cal-wrap"><div class="cal-grid">'+g+'</div></div>';
  }

  document.getElementById('page').innerHTML=
    '<div class="card"><div class="row-controls">'+yearSel('sc_y',s.y)+monSel('sc_m',s.m)
    +'<button class="btn sm" id="scL">조회</button>'
    +(rows.length?'<div style="margin-left:auto;display:flex;gap:6px;"><button class="btn sm ghost" id="btnPrint">🖨️ 인쇄</button><button class="btn sm ghost" id="btnDl">⬇️ 저장</button></div>':'')
    +'</div>'+calBody+'</div>';

  document.getElementById('scL').addEventListener('click',function(){
    st.schedule.y=+document.getElementById('sc_y').value;
    st.schedule.m=+document.getElementById('sc_m').value;
    render();
  });
  if(rows.length){
    var bp=document.getElementById('btnPrint'); if(bp) bp.addEventListener('click',function(){printSched(s.y,s.m,rows);});
    var bd=document.getElementById('btnDl');    if(bd) bd.addEventListener('click',function(){dlSched(s.y,s.m,rows);});
  }
}

function printSched(y,m,rows){var w=window.open('','_blank','width=900,height=700');w.document.write(buildPrintHTML(y,m,rows));w.document.close();w.focus();setTimeout(function(){w.print();},400);}
function dlSched(y,m,rows){var blob=new Blob([buildPrintHTML(y,m,rows)],{type:'text/html;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='감독표_'+y+'년_'+m+'월.html';a.click();URL.revokeObjectURL(url);toast('다운로드 완료');}
function buildPrintHTML(y,m,rows){var byD={};rows.forEach(function(r){byD[r.date]=r;});var fd=dowOf(y,m,1),total=dim(y,m);var cells=DOW_KR.map(function(d,i){return'<div class="dow-hd '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>';}).join('');for(var i=0;i<fd;i++)cells+='<div class="cell empty"></div>';for(var d=1;d<=total;d++){var ds=fmt(y,m,d),row=byD[ds],dw=dowOf(y,m,d);var sat=dw===6,sun=dw===0,excl=!row||row.status==='제외',chng=row&&row.status==='변경';var bg=excl?(sat||sun?'#f9fafb':'#f3f4f6'):chng?'#eff6ff':'#fff';var bc=chng?'#93c5fd':'#e5e7eb';var dc=sat?'#1d4ed8':sun?'#b91c1c':'#9ca3af';var body='';if(sat||sun)body='<div style="font-size:10px;color:#9ca3af;">주말</div>';else if(excl)body='<span style="font-size:10px;background:#f3f4f6;color:#6b7280;padding:1px 5px;border-radius:999px;">'+(row&&row.note?row.note:'제외')+'</span>';else body='<div style="font-size:13px;font-weight:700;color:'+(chng?'#1d4ed8':'#111')+';">'+row.current+'</div><span style="font-size:10px;padding:1px 5px;border-radius:999px;'+(chng?'background:#dbeafe;color:#1e40af':'background:#dcfce7;color:#166534')+'">'+(chng?'변경':'정상')+'</span>';cells+='<div class="cell" style="background:'+bg+';border-color:'+bc+';opacity:'+(sat||sun||excl?0.6:1)+'"><div style="font-size:11px;font-weight:700;color:'+dc+';">'+d+'</div>'+body+'</div>';}return'<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>감독표 '+y+'년 '+m+'월</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#fff;padding:24px;}h1{font-size:18px;font-weight:700;margin-bottom:4px;}.sub{font-size:13px;color:#6b7280;margin-bottom:16px;}.lg{display:flex;gap:16px;margin-bottom:12px;font-size:12px;}.li{display:flex;align-items:center;gap:5px;}.ld{width:11px;height:11px;border-radius:3px;}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}.dow-hd{text-align:center;font-size:11px;font-weight:700;padding:5px 0;color:#9ca3af;}.dow-hd.sat{color:#1d4ed8;}.dow-hd.sun{color:#b91c1c;}.cell{min-height:70px;border-radius:6px;border:1px solid #e5e7eb;padding:5px 6px;}.cell.empty{background:transparent;border-color:transparent;}@media print{body{padding:8px;}@page{size:A4 landscape;margin:10mm;}}</style></head><body><h1>📋 본교무실 감독표 · '+y+'년 '+m+'월</h1><div class="sub">대진고등학교 · 출력일: '+new Date().toLocaleDateString('ko-KR')+'</div><div class="lg"><div class="li"><div class="ld" style="background:#dcfce7;border:1px solid #16a34a"></div>정상</div><div class="li"><div class="ld" style="background:#dbeafe;border:1px solid #3b82f6"></div>변경됨</div><div class="li"><div class="ld" style="background:#f3f4f6;border:1px solid #d1d5db"></div>제외</div></div><div class="grid">'+cells+'</div></body></html>';}

// ══════════════════════════════════════════════════════
//  P2: 월별 배정
// ══════════════════════════════════════════════════════
async function P2(){
  var s=st.assign, rows=store.assignRows, grid='';
  if(rows.length){
    var fd=dowOf(s.y,s.m,1),total=dim(s.y,s.m),byD={};
    rows.forEach(function(r){byD[r.date]=r;});
    grid+=DOW_KR.map(function(d,i){return'<div class="dow-hd '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>';}).join('');
    for(var i=0;i<fd;i++) grid+='<div class="e-cell empty"></div>';
    for(var d=1;d<=total;d++){
      var ds=fmt(s.y,s.m,d),row=byD[ds],dw=dowOf(s.y,s.m,d);
      var sat=dw===6,sun=dw===0;
      var dd='<div class="cell-d '+(sat?'sat':sun?'sun':'')+'">'+d+'</div>';
      if(sat||sun){grid+='<div class="e-cell wknd">'+dd+'<div style="font-size:10px;color:#9ca3af;margin-top:2px;">주말</div></div>';continue;}
      if(row.status==='제외'){
        grid+='<div class="e-cell excl" data-ds="'+ds+'">'+dd+'<div style="font-size:10px;color:#92400e;font-weight:700;margin-top:2px;">🚫 '+(row.note||'제외')+'</div><div class="hint">클릭→복구</div></div>';
      } else {
        var sel=TEACHERS.map(function(t){return'<option'+(t===row.current?' selected':'')+'>'+t+'</option>';}).join('');
        grid+='<div class="e-cell normal" data-ds="'+ds+'">'+dd+'<select class="as-sel" data-ds="'+ds+'">'+sel+'</select><div class="hint">클릭→제외</div></div>';
      }
    }
  }

  document.getElementById('page').innerHTML=
    '<div class="card">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">'
    +'<div style="font-size:12px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:999px;padding:4px 12px;font-weight:600;">🔓 관리자 모드</div>'
    +'<div style="display:flex;gap:6px;"><button class="btn sm ghost" id="btnChgPw">🔑 비밀번호 변경</button><button class="btn sm ghost" id="btnLock">🔒 잠금</button></div>'
    +'</div>'
    +'<div class="row-controls">'+yearSel('as_y',s.y)+monSel('as_m',s.m)
    +'<button class="btn sm primary" id="btnAuto">자동 배정</button>'
    +'<button class="btn sm ghost" id="btnClear">초기화</button>'
    +'<button class="btn sm success" id="btnSave"'+(rows.length?'':' disabled')+'>저장</button>'
    +'</div>'
    +(!rows.length
      ?'<div class="warn-box"><b>📌 사용 방법</b><br>① 연도·월 선택 후 [자동 배정]<br>② 제외할 날짜 클릭 → 노란색<br>③ 드롭다운으로 감독자 수동 변경<br>④ [저장]</div>'
      :'<div class="legend" style="margin-bottom:.75rem"><div class="leg"><div class="leg-dot" style="background:#fff;border:1px solid #d1d5db"></div>배정일</div><div class="leg"><div class="leg-dot" style="background:#fef9c3;border:1px solid #fde047"></div>제외일</div></div><div class="cal-wrap"><div class="cal-grid" id="aGrid">'+grid+'</div></div>')
    +'</div>';

  document.getElementById('btnLock').addEventListener('click',function(){
    assignUnlocked=false;
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
    document.querySelector('[data-tab="schedule"]').classList.add('active');
    activeTab='schedule'; render(); toast('잠겼습니다.');
  });

  document.getElementById('btnChgPw').addEventListener('click',function(){
    var root=document.getElementById('modalRoot');
    root.innerHTML='<div class="modal-overlay" id="ov"><div class="modal" style="max-width:360px"><h3>🔑 비밀번호 변경</h3><div style="display:flex;flex-direction:column;gap:10px;"><div><div style="font-size:12px;color:#6b7280;margin-bottom:4px;">현재 비밀번호</div><input type="password" id="c1" style="width:100%"></div><div><div style="font-size:12px;color:#6b7280;margin-bottom:4px;">새 비밀번호 (4자 이상)</div><input type="password" id="c2" style="width:100%"></div><div><div style="font-size:12px;color:#6b7280;margin-bottom:4px;">새 비밀번호 확인</div><input type="password" id="c3" style="width:100%"></div></div><div id="cErr" style="color:#b91c1c;font-size:12px;margin-top:.5rem;min-height:18px;"></div><div class="modal-btns"><button class="btn ghost" id="cCan">취소</button><button class="btn primary" id="cOk">변경</button></div></div></div>';
    root.querySelector('#cCan').addEventListener('click',function(){root.innerHTML='';});
    root.querySelector('#ov').addEventListener('click',function(e){if(e.target.id==='ov')root.innerHTML='';});
    root.querySelector('#cOk').addEventListener('click',function(){
      var cur=root.querySelector('#c1').value,nw=root.querySelector('#c2').value,conf=root.querySelector('#c3').value,err=root.querySelector('#cErr');
      if(cur!==getStoredPW()){err.textContent='현재 비밀번호가 틀렸습니다.';return;}
      if(!nw||nw.length<4){err.textContent='4자 이상 입력해주세요.';return;}
      if(nw!==conf){err.textContent='새 비밀번호가 일치하지 않습니다.';return;}
      setStoredPW(nw); root.innerHTML=''; toast('비밀번호가 변경되었습니다.');
    });
  });

  document.getElementById('btnAuto').addEventListener('click',function(){
    var y=+document.getElementById('as_y').value,m=+document.getElementById('as_m').value;
    st.assign.y=y; st.assign.m=m; store.userExcl=[];
    store.assignRows=autoAssign(y,m,[],CONFIG.continueFromLastMonth?store.lastAssignIdx:0);
    render();
  });
  document.getElementById('btnClear').addEventListener('click',function(){store.assignRows=[];store.userExcl=[];render();});
  document.getElementById('btnSave').addEventListener('click',async function(){
    if(!store.assignRows.length) return;
    toast('저장 중...');
    var ok=await svc.saveSchedule(store.assignRows,st.assign.y,st.assign.m,getUser());
    if(ok!==false) toast(st.assign.y+'년 '+st.assign.m+'월 감독표가 저장되었습니다.');
    else toast('저장 실패',true);
  });

  document.querySelectorAll('.as-sel').forEach(function(sel){
    sel.addEventListener('click',function(e){e.stopPropagation();});
    sel.addEventListener('mousedown',function(e){e.stopPropagation();});
    sel.addEventListener('change',function(e){
      e.stopPropagation();
      var row=store.assignRows.find(function(r){return r.date===e.target.dataset.ds;});
      if(row){row.current=e.target.value;row.type='수동';}
    });
  });

  var ag=document.getElementById('aGrid');
  if(ag) ag.addEventListener('click',function(e){
    if(e.target.tagName==='SELECT'||e.target.tagName==='OPTION') return;
    var cell=e.target.closest('[data-ds]'); if(!cell) return;
    var ds=cell.dataset.ds,row=store.assignRows.find(function(r){return r.date===ds;}); if(!row) return;
    if(row.status==='제외'){
      var ab=store.assignRows.filter(function(r){return r.status!=='제외'&&r.date<ds;}).length;
      var t=TEACHERS[(store.lastAssignIdx+ab)%TEACHERS.length];
      row.orig=t;row.current=t;row.status='정상';row.type='수동';row.note='';
      store.userExcl=store.userExcl.filter(function(x){return x!==ds;});
    } else {
      row.orig=null;row.current=null;row.status='제외';row.type='자동';row.note='배정제외';
      if(store.userExcl.indexOf(ds)<0) store.userExcl.push(ds);
    }
    render();
  });
}

// ══════════════════════════════════════════════════════
//  P3: 교체 관리
// ══════════════════════════════════════════════════════
async function P3(){
  var s=st.swap; showLoading();
  var allRows=await svc.getSchedule(s.y,s.m);
  var byD={};allRows.forEach(function(r){byD[r.date]=r;});

  var stepA=s.selA?'<span class="step-chip">'+s.selA.date+' '+s.selA.dow+' · '+s.selA.teacher+'</span>':'<span class="step-chip empty-chip">① 교체할 날짜 선택</span>';
  var stepB=s.selB?'<span class="step-chip b">'+s.selB.date+' '+s.selB.dow+' · '+s.selB.teacher+'</span>':'<span class="step-chip empty-chip">② 바꿀 날짜 선택</span>';

  var grid='';
  if(!allRows.length){
    grid='<div class="warn-box">해당 월 데이터가 없습니다. [월별 배정]에서 먼저 배정을 생성하세요.</div>';
  } else {
    var fd=dowOf(s.y,s.m,1),total=dim(s.y,s.m);
    var g=DOW_KR.map(function(d,i){return'<div class="dow-hd '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>';}).join('');
    for(var i=0;i<fd;i++) g+='<div class="s-cell empty"></div>';
    for(var d=1;d<=total;d++){
      var ds=fmt(s.y,s.m,d),row=byD[ds],dw=dowOf(s.y,s.m,d);
      var sat=dw===6,sun=dw===0,isExcl=!row||row.status==='제외';
      var isSelA=s.selA&&s.selA.date===ds,isSelB=s.selB&&s.selB.date===ds,isChng=row&&row.status==='변경';
      var dd='<div class="cell-d '+(sat?'sat':sun?'sun':'')+'">'+d+'</div>';
      if(sat||sun){g+='<div class="s-cell wknd">'+dd+'<div style="font-size:10px;color:#9ca3af;margin-top:2px;">주말</div></div>';continue;}
      if(isExcl){g+='<div class="s-cell excl">'+dd+'<span class="cell-tag b-excluded">'+(row&&row.note?row.note:'제외')+'</span></div>';continue;}
      var cls='s-cell normal';
      if(isSelA)cls='s-cell sel-a';else if(isSelB)cls='s-cell sel-b';else if(isChng)cls='s-cell normal changed-cell';
      var nc=isSelA?'color:#1e40af;':isSelB?'color:#166534;':isChng?'color:#1d4ed8;':'color:#111;';
      var tag=isSelA?'<span class="cell-tag b-changed" style="margin-top:2px;">① 선택됨</span>':isSelB?'<span class="cell-tag b-normal" style="margin-top:2px;">② 선택됨</span>':isChng?'<span class="cell-tag b-changed" style="margin-top:2px;">변경됨</span>':'';
      g+='<div class="'+cls+'" data-ds="'+ds+'">'+dd+'<div style="font-size:12px;font-weight:700;margin-top:2px;'+nc+'">'+(row.current||'')+'</div>'+tag+'</div>';
    }
    grid='<div class="cal-wrap"><div class="cal-grid" id="swGrid">'+g+'</div></div>';
  }

  document.getElementById('page').innerHTML=
    '<div class="card"><div class="row-controls">'+yearSel('sw_y',s.y)+monSel('sw_m',s.m)
    +'<button class="btn sm ghost" id="swReset">선택 초기화</button></div>'
    +'<div class="step-bar">'+stepA+'<span class="step-arrow">⇄</span>'+stepB
    +(s.selA&&s.selB?'<button class="btn sm primary" id="btnCfm" style="margin-left:auto">교체 확인</button>':'')
    +'</div>'
    +'<div class="legend" style="margin-bottom:.75rem"><div class="leg"><div class="leg-dot" style="background:#dbeafe;border:1.5px solid #185FA5"></div>① 선택</div><div class="leg"><div class="leg-dot" style="background:#dcfce7;border:1.5px solid #15803d"></div>② 선택</div><div class="leg"><div class="leg-dot" style="background:#eff6ff;border:1px solid #93c5fd"></div>이미 변경됨</div></div>'
    +grid+'</div>';

  document.getElementById('sw_y').addEventListener('change',function(e){s.y=+e.target.value;s.selA=null;s.selB=null;render();});
  document.getElementById('sw_m').addEventListener('change',function(e){s.m=+e.target.value;s.selA=null;s.selB=null;render();});
  document.getElementById('swReset').addEventListener('click',function(){s.selA=null;s.selB=null;render();});

  var sg=document.getElementById('swGrid');
  if(sg) sg.addEventListener('click',function(e){
    var cell=e.target.closest('[data-ds]'); if(!cell) return;
    var ds=cell.dataset.ds,row=byD[ds]; if(!row||row.status==='제외') return;
    if(!s.selA){s.selA={date:ds,teacher:row.current,dow:row.dow};s.selB=null;}
    else if(s.selA.date===ds){s.selA=null;s.selB=null;}
    else if(!s.selB){
      s.selB={date:ds,teacher:row.current,dow:row.dow};
      if(s.selA.teacher===s.selB.teacher){toast('같은 감독자는 교체할 수 없습니다.',true);s.selB=null;return;}
    } else {s.selA={date:ds,teacher:row.current,dow:row.dow};s.selB=null;}
    render();
  });

  var btnCfm=document.getElementById('btnCfm');
  if(btnCfm) btnCfm.addEventListener('click',function(){
    if(!s.selA||!s.selB) return;
    var A=s.selA,B=s.selB;
    showModal(
      '<div class="modal"><h3>🔄 감독 교체 확인</h3>'
      +'<div class="swap-card"><div class="swap-half from"><div class="swap-label">① 날짜</div><div class="swap-date">'+A.date+'</div><div class="swap-name">'+A.teacher+'</div><div class="swap-dow">'+A.dow+'요일</div></div>'
      +'<div class="swap-half to"><div class="swap-label">② 날짜</div><div class="swap-date">'+B.date+'</div><div class="swap-name">'+B.teacher+'</div><div class="swap-dow">'+B.dow+'요일</div></div></div>'
      +'<div class="swap-arrow-wrap">⇄ 두 날짜의 감독자를 서로 맞바꿉니다</div>'
      +'<div class="reason-wrap"><div class="reason-label">교체 사유 (선택)</div><input type="text" id="swReason" placeholder="예: 출장, 연수 등" style="width:100%"></div>'
      +'<div class="modal-btns"><button class="btn ghost" id="mCancel">취소</button><button class="btn primary" id="mOk">교체 확정</button></div></div>',
      async function(){
        var reason=document.getElementById('swReason')?document.getElementById('swReason').value:'';
        toast('처리 중...');
        var res=await svc.swapByDate(A.date,B.date,reason,getUser());
        if(res&&res.ok){toast('교체가 완료되었습니다.');s.selA=null;s.selB=null;render();}
        else toast((res&&res.msg)||'교체 실패',true);
      }
    );
  });
}

// ══════════════════════════════════════════════════════
//  P4: 월별 통계
// ══════════════════════════════════════════════════════
async function P4(){
  var s=st.stats; showLoading();
  var allRows=await svc.getSchedule(s.y,s.m);
  var rows=allRows.filter(function(r){return r.status!=='제외';});
  var stats=svc.getStats(rows);

  document.getElementById('page').innerHTML=
    '<div class="card"><div class="row-controls">'+yearSel('st_y',s.y)+monSel('st_m',s.m)+'<button class="btn sm" id="stL">조회</button></div>'
    +(!rows.length?'<div class="info-box">해당 월 데이터가 없습니다.</div>'
      :'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.25rem">'
        +[['총 배정 일수',rows.length+'일'],['교체 발생',rows.filter(function(r){return r.status==='변경';}).length+'건'],['감독 인원',TEACHERS.length+'명']].map(function(x){
          return'<div style="background:#f9fafb;border-radius:8px;padding:.875rem"><div style="font-size:11px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:4px">'+x[0]+'</div><div style="font-size:24px;font-weight:700">'+x[1]+'</div></div>';
        }).join('')+'</div>'
        +'<div class="overflow-x"><table><thead><tr><th>이름</th><th>원래 배정</th><th>현재 배정</th><th>빠진 횟수</th><th>추가 횟수</th><th>차이</th></tr></thead><tbody>'
        +stats.map(function(r){var d=r.currCount-r.origCount;return'<tr><td style="font-weight:700">'+r.name+'</td><td>'+r.origCount+'</td><td style="font-weight:600">'+r.currCount+'</td><td style="color:'+(r.removed?'#b91c1c':'#9ca3af')+'">'+r.removed+'</td><td style="color:'+(r.added?'#15803d':'#9ca3af')+'">'+r.added+'</td><td style="font-weight:700;color:'+(d>0?'#15803d':d<0?'#b91c1c':'#9ca3af')+'">'+(d>0?'+':'')+d+'</td></tr>';}).join('')
        +'</tbody></table></div>')
    +'</div>';

  document.getElementById('stL').addEventListener('click',function(){
    st.stats.y=+document.getElementById('st_y').value;
    st.stats.m=+document.getElementById('st_m').value;
    render();
  });
}

// ══════════════════════════════════════════════════════
//  P5: 변경 로그
// ══════════════════════════════════════════════════════
async function P5(){
  showLoading();
  var logs=await svc.getLogs();

  document.getElementById('page').innerHTML=
    '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem"><div style="font-weight:700;font-size:14px">변경 이력</div><span style="font-size:11px;color:#9ca3af">총 '+logs.length+'건</span></div>'
    +(!logs.length?'<div class="info-box">변경 이력이 없습니다.</div>'
      :'<div class="overflow-x"><table><thead><tr><th>변경시간</th><th>유형</th><th>대상</th><th class="hide-m">이전값</th><th>새값</th><th class="hide-m">작업자</th><th class="hide-m">사유</th></tr></thead><tbody>'
        +logs.map(function(l){return'<tr><td style="font-size:11px;white-space:nowrap;color:#6b7280">'+l.time+'</td><td><span class="badge b-'+(l.type==='교체'?'swap':l.type==='월배정'?'auto':'manual')+'">'+l.type+'</span></td><td style="font-size:12px">'+l.target+'</td><td class="hide-m" style="color:#9ca3af">'+(l.prev||'–')+'</td><td style="font-weight:600">'+(l.next||'–')+'</td><td class="hide-m" style="font-size:12px">'+(l.user||'–')+'</td><td class="hide-m" style="color:#9ca3af;font-size:12px">'+(l.reason||'–')+'</td></tr>';}).join('')
        +'</tbody></table></div>')
    +'</div>';
}

// ══════════════════════════════════════════════════════
//  초기 실행
// ══════════════════════════════════════════════════════
svc.loadHolidays().then(function(){ render(); });
</script>
