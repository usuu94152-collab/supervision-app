<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>본교무실 감독표 – 대진고등학교</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;margin:0;}
select,input[type=text],input[type=password]{border:1px solid #d1d5db;border-radius:6px;padding:6px 10px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;}
select:focus,input:focus{outline:none;border-color:#185FA5;}
.btn{border:1px solid #d1d5db;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;background:#fff;color:#374151;font-family:inherit;transition:background .1s;}
.btn:hover{background:#f3f4f6;}
.btn.primary{background:#185FA5;color:#fff;border-color:#185FA5;}
.btn.primary:hover{background:#1e4e8c;}
.btn.success{background:#15803d;color:#fff;border-color:#15803d;}
.btn.success:hover{background:#166534;}
.btn.ghost{background:transparent;border-color:#e5e7eb;color:#6b7280;}
.btn.ghost:hover{background:#f9fafb;}
.btn.sm{padding:4px 10px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;}
.b-normal{background:#dcfce7;color:#166534;}
.b-changed{background:#dbeafe;color:#1e40af;}
.b-excluded{background:#f3f4f6;color:#6b7280;}
.b-swap{background:#fce7f3;color:#9d174d;}
.b-auto{background:#dbeafe;color:#1e40af;}
.info-box{background:#eff6ff;color:#1e40af;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:.75rem;}
.warn-box{background:#fffbeb;color:#92400e;border-radius:6px;padding:8px 12px;font-size:12px;margin-bottom:.75rem;border:1px solid #fde68a;}
.row-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
.overflow-x{overflow-x:auto;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto;}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;white-space:nowrap;color:#6b7280;border:none;border-bottom:2px solid transparent;background:none;transition:color .15s;font-family:inherit;}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700;}
.tab:hover:not(.active){color:#111;background:#f9fafb;}
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;min-width:350px;}
.dow-hd{text-align:center;font-size:11px;font-weight:700;padding:6px 0;color:#9ca3af;}
.dow-hd.sat{color:#1d4ed8;}.dow-hd.sun{color:#b91c1c;}
.r-cell{min-height:72px;border-radius:7px;border:1px solid #e5e7eb;background:#fff;padding:5px 6px;}
.r-cell.empty{background:transparent;border-color:transparent;}
.r-cell.wknd{background:#f9fafb;opacity:.6;}
.r-cell.excl{background:#f3f4f6;opacity:.6;}
.r-cell.chng{border-color:#93c5fd;background:#eff6ff;}
.cell-d{font-size:11px;font-weight:600;color:#9ca3af;margin-bottom:3px;}
.cell-d.sat{color:#1d4ed8;}.cell-d.sun{color:#b91c1c;}
.cell-d.tod{background:#185FA5;color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
.cell-nm{font-size:12px;font-weight:700;color:#111;}
.cell-nm.ch{color:#1d4ed8;}
.cell-tag{font-size:10px;margin-top:2px;padding:1px 5px;border-radius:999px;display:inline-block;}
.e-cell{border-radius:7px;border:1px solid #e5e7eb;background:#fff;padding:5px 6px;min-height:88px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none;}
.e-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.e-cell.wknd{background:#f9fafb;cursor:default;}
.e-cell.excl{background:#fef9c3;border-color:#fde047;}
.e-cell.excl:hover{background:#fef08a;}
.e-cell.normal:hover{border-color:#93c5fd;background:#f0f9ff;}
.e-cell select{width:100%;font-size:11px;padding:3px 4px;margin-top:4px;border:1px solid #d1d5db;border-radius:4px;background:#fff;cursor:pointer;}
.hint{font-size:9px;color:#9ca3af;margin-top:2px;}
.s-cell{border-radius:7px;border:1.5px solid #e5e7eb;background:#fff;padding:6px 7px;min-height:80px;cursor:pointer;transition:border-color .12s,background .12s,transform .1s;user-select:none;}
.s-cell.empty{background:transparent;border-color:transparent;cursor:default;}
.s-cell.wknd{background:#f9fafb;opacity:.55;cursor:default;}
.s-cell.excl{background:#f3f4f6;opacity:.55;cursor:default;}
.s-cell.normal:hover{border-color:#93c5fd;background:#f0f9ff;transform:scale(1.02);}
.s-cell.sel-a{border-color:#185FA5!important;background:#dbeafe!important;box-shadow:0 0 0 3px #bfdbfe;}
.s-cell.sel-b{border-color:#15803d!important;background:#dcfce7!important;box-shadow:0 0 0 3px #bbf7d0;}
.s-cell.changed-cell{border-color:#93c5fd;background:#eff6ff;}
.step-bar{display:flex;align-items:center;gap:12px;background:#f0f9ff;border:1px solid #bfdbfe;border-radius:8px;padding:.75rem 1rem;margin-bottom:.875rem;flex-wrap:wrap;}
.step-chip{display:inline-flex;align-items:center;gap:6px;background:#185FA5;color:#fff;border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;}
.step-chip.b{background:#15803d;}
.step-chip.empty-chip{background:#e5e7eb;color:#6b7280;}
.step-arrow{font-size:16px;color:#9ca3af;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.18);}
.modal h3{font-size:16px;font-weight:700;margin-bottom:1rem;}
.swap-card{display:flex;border:1.5px solid #e5e7eb;border-radius:10px;overflow:hidden;margin:1rem 0;}
.swap-half{flex:1;padding:.875rem 1rem;text-align:center;}
.swap-half.from{background:#dbeafe;border-right:1.5px solid #e5e7eb;}
.swap-half.to{background:#dcfce7;}
.swap-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#6b7280;margin-bottom:6px;}
.swap-date{font-size:11px;color:#6b7280;margin-bottom:2px;}
.swap-name{font-size:17px;font-weight:700;color:#111;margin-bottom:2px;}
.swap-dow{font-size:12px;color:#9ca3af;}
.swap-arrow-wrap{display:flex;align-items:center;justify-content:center;padding:.75rem;background:#f9fafb;border-top:1.5px solid #e5e7eb;border-bottom:1.5px solid #e5e7eb;font-size:13px;color:#6b7280;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;font-weight:700;font-size:11px;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f9fafb;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:1rem;font-size:12px;align-items:center;color:#374151;}
.leg{display:flex;align-items:center;gap:5px;}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#15803d;color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;font-weight:600;z-index:200;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15);}
.toast.show{opacity:1;}
.toast.err{background:#b91c1c;}
.loading{text-align:center;padding:3rem;color:#9ca3af;font-size:14px;}
@media(max-width:600px){
  .card{padding:.875rem;}
  .row-controls{flex-direction:column;align-items:stretch;}
  .hide-m{display:none!important;}
  th,td{padding:6px 8px;font-size:12px;}
}
</style>
</head>
<body>
<div style="max-width:960px;margin:0 auto;padding-bottom:3rem;">
  <div style="background:#fff;border-bottom:1px solid #e5e7eb;padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
    <div>
      <div style="font-size:15px;font-weight:700;">&#128203; 본교무실 감독표</div>
      <div style="font-size:11px;color:#9ca3af;margin-top:1px;">대진고등학교</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:11px;color:#9ca3af;">작업자</span>
      <select id="currentUser" style="font-size:12px;padding:4px 8px;">
        <option value="">선택</option>
        <option>신현주</option><option>이용주</option><option>강성자</option>
        <option>유성욱</option><option>이다원</option><option>이애정</option><option>최진영</option>
      </select>
    </div>
  </div>
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-tab="schedule">월간 감독표</button>
    <button class="tab" data-tab="assign">월별 배정 &#128274;</button>
    <button class="tab" data-tab="swap">교체 관리</button>
    <button class="tab" data-tab="stats">월별 통계</button>
    <button class="tab" data-tab="logs">변경 로그</button>
  </div>
  <div id="page" style="padding:1rem;"></div>
</div>
<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
var GAS = 'https://script.google.com/macros/s/AKfycbxCtkcYnh1MKB0LWjfye2M7XrTVYHyl0uFUaAMpRk6Mdw6BjJuWZDDoOHNiCcKObyUiCw/exec';

function getPW(){ return localStorage.getItem('spv_pw') || '1234'; }
function setPW(v){ localStorage.setItem('spv_pw', v); }

var TEACHERS = ['신현주','이용주','강성자','유성욱','이다원','이애정','최진영'];
var DOW      = ['일','월','화','수','목','금','토'];
var CFG      = { skipWeekends: true, continueFromLastMonth: true };

var store = {
  assignRows: [], userExcl: [], lastIdx: 0, assignDirty: false,
  holidays: [
    {date:'2026-04-14', assign:'N', desc:'임시공휴일'},
    {date:'2026-04-21', assign:'N', desc:'중간고사 1일'},
    {date:'2026-04-22', assign:'N', desc:'중간고사 2일'},
    {date:'2026-04-23', assign:'N', desc:'중간고사 3일'},
    {date:'2026-05-05', assign:'N', desc:'어린이날'},
    {date:'2026-06-06', assign:'N', desc:'현충일'}
  ]
};
var unlocked = false;
var cbIdx = 0;

// ── 인메모리 캐시 ─────────────────────────────────────────
// GAS 응답을 캐싱해서 같은 데이터 재요청 방지
var cache = {
  schedule: {},   // key: "2026-4" → rows 배열
  logs: null,
  holidays: null,

  schedKey: function(y,m){ return y+'-'+m; },

  getSchedule: function(y,m){
    return this.schedule[this.schedKey(y,m)] || null;
  },
  setSchedule: function(y,m,rows){
    this.schedule[this.schedKey(y,m)] = rows;
  },
  // 저장/교체 후 해당 월 캐시 무효화
  invalidateSchedule: function(y,m){
    delete this.schedule[this.schedKey(y,m)];
    this.logs = null;  // 로그도 함께 무효화
  }
};

// ── JSONP 호출 ────────────────────────────────────────────
function gas(action, params) {
  return new Promise(function(resolve) {
    var name = '_cb' + (++cbIdx);
    var tid = setTimeout(function(){
      delete window[name];
      var el = document.getElementById(name);
      if (el) el.parentNode.removeChild(el);
      resolve(null);
    }, 20000);

    window[name] = function(data) {
      clearTimeout(tid);
      delete window[name];
      var el = document.getElementById(name);
      if (el) el.parentNode.removeChild(el);
      resolve(data);
    };

    var url = GAS + '?callback=' + name + '&action=' + encodeURIComponent(action);
    if (params) {
      Object.keys(params).forEach(function(k) {
        var v = params[k];
        url += '&' + k + '=' + encodeURIComponent(typeof v === 'object' ? JSON.stringify(v) : String(v));
      });
    }

    var s = document.createElement('script');
    s.id = name;
    s.src = url;
    s.onerror = function() { clearTimeout(tid); delete window[name]; resolve(null); };
    document.head.appendChild(s);
  });
}

// ── 유틸 ──────────────────────────────────────────────────
function dim(y,m)    { return new Date(y,m,0).getDate(); }
function dow(y,m,d)  { return new Date(y,m-1,d).getDay(); }
function dname(y,m,d){ return DOW[dow(y,m,d)]; }
function wknd(y,m,d) { var w=dow(y,m,d); return w===0||w===6; }
function fmt(y,m,d)  { return y+'-'+p2(m)+'-'+p2(d); }
function p2(n)       { return String(n).padStart(2,'0'); }
function user()      { return document.getElementById('currentUser').value || '미지정'; }
function isHol(ds)   { return store.holidays.some(function(h){ return h.date===ds && h.assign==='N'; }); }
function holNote(ds) { var h=store.holidays.find(function(h){ return h.date===ds; }); return h ? h.desc : ''; }

// 날짜 정규화: ISO든 문자열이든 yyyy-MM-dd 로
function normDate(v) {
  if (!v) return '';
  var s = String(v).replace(/^'/,'');
  if (s.length > 10) s = s.slice(0,10);
  return s;
}

// ── 서비스 ────────────────────────────────────────────────
var svc = {
  async getSchedule(y, m) {
    // 캐시 확인
    var cached = cache.getSchedule(y, m);
    if (cached) return cached;

    var raw = await gas('getSchedule', {year:y, month:m});
    if (!Array.isArray(raw)) return [];
    var rows = raw.map(function(r) {
      var ds = normDate(r['날짜']);
      var pts = ds.split('-');
      return {
        date: ds, year: +pts[0]||+r['연도']||0, month: +pts[1]||+r['월']||0, day: +pts[2]||0,
        dow: String(r['요일']||''), orig: r['원래감독']||null, current: r['현재감독']||null,
        status: String(r['상태']||''), type: String(r['배정구분']||''), note: String(r['비고']||'')
      };
    }).filter(function(r){ return r.year===y && r.month===m; });

    cache.setSchedule(y, m, rows);  // 캐시 저장
    return rows;
  },

  async saveSchedule(rows, y, m, u) {
    toast('저장 중... (잠시 기다려주세요)');

    // 1) 해당 월 삭제
    var clr = await gas('clearMonth', {year:y, month:m});
    if (!clr || !clr.ok) { toast('초기화 실패', true); return false; }

    // 2) 10행씩 청크로 나눠서 저장 (URL 길이 제한 & 속도 균형)
    var CHUNK = 10;
    for (var i=0; i<rows.length; i+=CHUNK) {
      var chunk = rows.slice(i, i+CHUNK);
      var res = await gas('saveRows', {rows: chunk});
      if (!res || !res.ok) { toast('저장 실패', true); return false; }
    }

    // 3) 로그
    await gas('appendLog', {type:'월배정', target:y+'-'+p2(m), prev:'', next:'배정완료', user:u, reason:'달력 배정 저장'});
    cache.invalidateSchedule(y, m);  // 캐시 무효화
    return true;
  },

  async swapByDate(dA, dB, reason, u) {
    var res = await gas('swapByDate', {dateA:dA, dateB:dB, reason:reason, user:u});
    if (res && res.ok) {
      // 날짜에서 연/월 추출해서 캐시 무효화
      var pts = dA.split('-');
      cache.invalidateSchedule(+pts[0], +pts[1]);
    }
    return res || {ok:false, msg:'응답 없음'};
  },

  async getLogs() {
    if (cache.logs) return cache.logs;
    var raw = await gas('getLogs');
    if (!Array.isArray(raw)) return [];
    return raw.map(function(r){
      return {
        time:   String(r['변경시간']||''),    type:   String(r['작업유형']||''),
        target: String(r['날짜또는대상월']||''), prev: String(r['이전값']||''),
        next:   String(r['새값']||''),        user:   String(r['작업자']||''),
        reason: String(r['사유']||'')
      };
    });
    cache.logs = rows2;
    return rows2;
  },

  async loadHolidays() {
    var raw = await gas('getHolidays');
    if (Array.isArray(raw) && raw.length) {
      store.holidays = raw.map(function(r){
        return { date: normDate(r['날짜']), assign: String(r['배정여부']||'Y'), desc: String(r['설명']||'') };
      });
    }
  },

  stats(rows) {
    var s={};
    TEACHERS.forEach(function(t){ s[t]={name:t,origCount:0,currCount:0,removed:0,added:0}; });
    rows.forEach(function(r){
      if(r.orig    && s[r.orig])    s[r.orig].origCount++;
      if(r.current && s[r.current]) s[r.current].currCount++;
      if(r.orig && r.current && r.orig!==r.current){ s[r.orig].removed++; s[r.current].added++; }
    });
    return Object.values(s);
  }
};

// ── 자동 배정 ─────────────────────────────────────────────
function autoAssign(y, m) {
  var excl=store.userExcl, idx=CFG.continueFromLastMonth?store.lastIdx:0;
  var rows=[], total=dim(y,m);
  for (var d=1; d<=total; d++) {
    var ds=fmt(y,m,d), dn=dname(y,m,d);
    var skip=(CFG.skipWeekends&&wknd(y,m,d))||isHol(ds)||excl.indexOf(ds)>=0;
    if (skip) {
      var note=wknd(y,m,d)?'주말':(holNote(ds)||(excl.indexOf(ds)>=0?'배정제외':''));
      rows.push({date:ds,year:y,month:m,day:d,dow:dn,orig:null,current:null,status:'제외',type:'자동',note:note});
    } else {
      var t=TEACHERS[idx%TEACHERS.length]; idx++;
      rows.push({date:ds,year:y,month:m,day:d,dow:dn,orig:t,current:t,status:'정상',type:'자동',note:''});
    }
  }
  store.lastIdx=idx%TEACHERS.length;
  return rows;
}

// ── Toast / Modal / Loading ───────────────────────────────
var _tt;
function toast(msg, err) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(err?' err':'');
  clearTimeout(_tt); _tt=setTimeout(function(){el.className='toast';}, err?4000:2500);
}
function modal(html, onOk, onCancel) {
  var root=document.getElementById('modalRoot');
  root.innerHTML='<div class="modal-overlay" id="ov">'+html+'</div>';
  var ok=root.querySelector('#mOk'), cn=root.querySelector('#mCancel'), ov=root.querySelector('#ov');
  if(ok) ok.addEventListener('click',  function(){root.innerHTML='';if(onOk)onOk();});
  if(cn) cn.addEventListener('click',  function(){root.innerHTML='';if(onCancel)onCancel();});
  if(ov) ov.addEventListener('click',  function(e){if(e.target.id==='ov'){root.innerHTML='';if(onCancel)onCancel();}});
}
function loading(){ document.getElementById('page').innerHTML='<div class="loading">&#9203; 데이터를 불러오는 중...</div>'; }

// ── 탭 라우터 ─────────────────────────────────────────────
var tab='schedule';
var st={schedule:{y:2026,m:4},assign:{y:2026,m:4},swap:{y:2026,m:4,selA:null,selB:null},stats:{y:2026,m:4}};

document.getElementById('tabBar').addEventListener('click',function(e){
  var t=e.target.closest('[data-tab]'); if(!t) return;
  var nt=t.dataset.tab;
  if(nt==='assign'&&!unlocked){ lockModal(); return; }
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  t.classList.add('active'); tab=nt; render();
});
function render(){ ({schedule:P1,assign:P2,swap:P3,stats:P4,logs:P5})[tab](); }

function ysel(id,v){ return '<select id="'+id+'" style="width:88px">'+[2025,2026,2027].map(function(y){return'<option'+(y===v?' selected':'')+'>'+y+'</option>';}).join('')+'</select>'; }
function msel(id,v){ return '<select id="'+id+'" style="width:68px">'+Array.from({length:12},function(_,i){return'<option value="'+(i+1)+'"'+(i+1===v?' selected':'')+'>'+(i+1)+'월</option>';}).join('')+'</select>'; }

// ── 잠금 모달 ─────────────────────────────────────────────
function lockModal(){
  var root=document.getElementById('modalRoot');
  root.innerHTML='<div class="modal-overlay" id="ov"><div class="modal" style="max-width:340px;text-align:center;"><div style="font-size:40px;margin-bottom:.75rem;">&#128274;</div><h3>관리자 전용</h3><p style="font-size:13px;color:#6b7280;margin-bottom:1.5rem;">비밀번호를 입력해주세요.</p><div style="position:relative;max-width:260px;margin:0 auto;"><input type="password" id="pi" placeholder="비밀번호" style="width:100%;padding:10px 44px 10px 14px;font-size:15px;border:1.5px solid #d1d5db;border-radius:8px;text-align:center;"><button id="tp" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:#9ca3af;">&#128065;</button></div><div id="pe" style="color:#b91c1c;font-size:12px;margin-top:.5rem;min-height:18px;"></div><div style="display:flex;gap:8px;margin-top:1rem;"><button class="btn ghost" id="lc" style="flex:1">취소</button><button class="btn primary" id="lo" style="flex:1;font-weight:700;">확인</button></div></div></div>';
  var inp=root.querySelector('#pi'), err=root.querySelector('#pe');
  root.querySelector('#tp').addEventListener('click',function(){inp.type=inp.type==='password'?'text':'password';});
  setTimeout(function(){inp.focus();},80);
  function tryUnlock(){
    if(inp.value===getPW()){
      unlocked=true; root.innerHTML='';
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
      document.querySelector('[data-tab="assign"]').classList.add('active');
      tab='assign'; render();
    } else { err.textContent='비밀번호가 올바르지 않습니다.'; inp.value=''; inp.focus(); }
  }
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')tryUnlock();});
  root.querySelector('#lo').addEventListener('click',tryUnlock);
  root.querySelector('#lc').addEventListener('click',function(){root.innerHTML='';});
  root.querySelector('#ov').addEventListener('click',function(e){if(e.target.id==='ov')root.innerHTML='';});
}

// ── P1: 월간 감독표 ───────────────────────────────────────
async function P1(){
  var s=st.schedule; loading();
  var rows=await svc.getSchedule(s.y,s.m);
  var today=new Date();

  var body='';
  if(!rows.length){
    body='<div class="info-box">&#128204; 해당 월 데이터가 없습니다. [월별 배정] 탭에서 먼저 배정을 생성해주세요.</div>';
  } else {
    var fd=dow(s.y,s.m,1), total=dim(s.y,s.m), byD={};
    rows.forEach(function(r){byD[r.date]=r;});
    var g=DOW.map(function(d,i){return'<div class="dow-hd '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>';}).join('');
    for(var i=0;i<fd;i++) g+='<div class="r-cell empty"></div>';
    for(var d=1;d<=total;d++){
      var ds=fmt(s.y,s.m,d), row=byD[ds], dw2=dow(s.y,s.m,d);
      var sat=dw2===6, sun=dw2===0, excl=!row||row.status==='제외', chng=row&&row.status==='변경';
      var cls='r-cell'; if(sat||sun)cls+=' wknd'; else if(excl)cls+=' excl'; else if(chng)cls+=' chng';
      var isTod=(today.getFullYear()===s.y&&today.getMonth()===s.m-1&&today.getDate()===d);
      var dd=isTod?'<div class="cell-d"><span class="cell-d tod">'+d+'</span></div>':'<div class="cell-d '+(sat?'sat':sun?'sun':'')+'">'+d+'</div>';
      var bd='';
      if(sat||sun) bd='<div style="font-size:10px;color:#9ca3af;margin-top:2px;">주말</div>';
      else if(excl) bd='<span class="cell-tag b-excluded">'+(row&&row.note?row.note:'제외')+'</span>';
      else bd='<div class="cell-nm '+(chng?'ch':'')+'">'+row.current+'</div><span class="cell-tag '+(chng?'b-changed':'b-normal')+'">'+(chng?'변경':'정상')+'</span>';
      g+='<div class="'+cls+'">'+dd+bd+'</div>';
    }
    body='<div class="legend"><div class="leg"><div class="leg-dot" style="background:#dcfce7;border:1px solid #16a34a"></div>정상</div><div class="leg"><div class="leg-dot" style="background:#dbeafe;border:1px solid #3b82f6"></div>변경됨</div><div class="leg"><div class="leg-dot" style="background:#f3f4f6;border:1px solid #d1d5db"></div>배정 제외</div></div><div class="cal-wrap"><div class="cal-grid">'+g+'</div></div>';
  }

  document.getElementById('page').innerHTML=
    '<div class="card"><div class="row-controls">'+ysel('sc_y',s.y)+msel('sc_m',s.m)
    +'<button class="btn sm" id="scL">조회</button>'
    +(rows.length?'<div style="margin-left:auto;display:flex;gap:6px;"><button class="btn sm ghost" id="bPr">&#128424; 인쇄</button><button class="btn sm ghost" id="bDl">&#8681; 저장</button></div>':'')
    +'</div>'+body+'</div>';

  document.getElementById('scL').addEventListener('click',function(){st.schedule.y=+document.getElementById('sc_y').value;st.schedule.m=+document.getElementById('sc_m').value;render();});
  var bpr=document.getElementById('bPr'); if(bpr) bpr.addEventListener('click',function(){prtSched(s.y,s.m,rows);});
  var bdl=document.getElementById('bDl'); if(bdl) bdl.addEventListener('click',function(){dlSched(s.y,s.m,rows);});
}

function prtSched(y,m,rows){var w=window.open('','_blank','width=900,height=700');w.document.write(printHTML(y,m,rows));w.document.close();w.focus();setTimeout(function(){w.print();},400);}
function dlSched(y,m,rows){var b=new Blob([printHTML(y,m,rows)],{type:'text/html;charset=utf-8'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='감독표_'+y+'년_'+m+'월.html';a.click();URL.revokeObjectURL(u);toast('다운로드 완료');}

</head><body><h1>본교무실 감독표 '+y+'년 '+m+'월</h1><div class="sub">대진고등학교 · 출력일: '+new Date().toLocaleDateString('ko-KR')+'</div><div class="grid">'+c+'</div></body></html>';}

// ── P2: 월별 배정 ─────────────────────────────────────────
async function P2(){
  var s = st.assign;

  // Sheets에 저장된 데이터가 있으면 불러와서 편집 상태로 복원
  if (store.assignRows.length === 0) {
    var saved = await svc.getSchedule(s.y, s.m);
    if (saved.length > 0) {
      store.assignRows = saved;  // 저장된 데이터로 복원
    }
  }

  var rows = store.assignRows;
  var grid = '';

  if (rows.length) {
    var fd = dow(s.y,s.m,1), total = dim(s.y,s.m), byD = {};
    rows.forEach(function(r){ byD[r.date] = r; });
    grid += DOW.map(function(d,i){ return '<div class="dow-hd '+(i===0?'sun':i===6?'sat':'')+'">'+d+'</div>'; }).join('');
    for (var i=0; i<fd; i++) grid += '<div class="e-cell empty"></div>';
    for (var d=1; d<=total; d++) {
      var ds = fmt(s.y,s.m,d), row = byD[ds], dw2 = dow(s.y,s.m,d);
      var sat = dw2===6, sun = dw2===0;
      var dd = '<div class="cell-d '+(sat?'sat':sun?'sun':'')+'">'+d+'</div>';
      if (sat||sun) { grid += '<div class="e-cell wknd">'+dd+'<div style="font-size:10px;color:#9ca3af;margin-top:2px;">주말</div></div>'; continue; }
      if (!row || row.status === '제외') {
        var note = row ? (row.note||'제외') : '제외';
        grid += '<div class="e-cell excl" data-ds="'+ds+'">'+dd+'<div style="font-size:10px;color:#92400e;font-weight:700;margin-top:2px;">&#128683; '+note+'</div><div class="hint">클릭&#8594;복구</div></div>';
      } else {
        var sel = TEACHERS.map(function(t){ return '<option'+(t===row.current?' selected':'')+'>'+t+'</option>'; }).join('');
        grid += '<div class="e-cell normal" data-ds="'+ds+'">'+dd+'<select class="asel" data-ds="'+ds+'">'+sel+'</select><div class="hint">클릭&#8594;제외</div></div>';
      }
    }
  }

  // 저장 버튼: 수정 사항이 있을 때만 활성화
  var hasSaved = rows.length > 0;
  var hasUnsaved = store.assignDirty;

  document.getElementById('page').innerHTML =
    '<div class="card">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;">'
    +'<div style="font-size:12px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:999px;padding:4px 12px;font-weight:600;">&#128275; 관리자 모드</div>'
    +'<div style="display:flex;gap:6px;"><button class="btn sm ghost" id="bCpw">&#128273; 비밀번호 변경</button><button class="btn sm ghost" id="bLk">&#128274; 잠금</button></div>'
    +'</div>'
    +'<div class="row-controls">'+ysel('as_y',s.y)+msel('as_m',s.m)
    +'<button class="btn sm primary" id="bLoad">&#128260; 불러오기</button>'
    +'<button class="btn sm ghost" id="bAuto">자동 배정</button>'
    +'<button class="btn sm ghost" id="bClr">초기화</button>'
    +'<button class="btn sm success" id="bSave"'+(hasSaved?'':' disabled')+'>&#128190; 저장'+(hasUnsaved?' *':'')+' </button>'
    +'</div>'
    +(hasUnsaved ? '<div class="info-box">&#9998; 저장되지 않은 변경 사항이 있습니다. [저장]을 눌러주세요.</div>' : '')
    +(!rows.length
      ? '<div class="warn-box"><b>&#128204; 사용 방법</b><br>① 연도·월 선택 후 <b>[불러오기]</b> (저장된 배정 표시)<br>② 또는 <b>[자동 배정]</b>으로 새로 생성<br>③ 달력에서 날짜 클릭 → 제외/복구<br>④ 드롭다운으로 감독자 변경<br>⑤ <b>[저장]</b> 클릭</div>'
      : '<div class="legend" style="margin-bottom:.75rem">'
        +'<div class="leg"><div class="leg-dot" style="background:#fff;border:1px solid #d1d5db"></div>배정일 (드롭다운으로 변경)</div>'
        +'<div class="leg"><div class="leg-dot" style="background:#fef9c3;border:1px solid #fde047"></div>제외일 (클릭→복구)</div>'
        +'</div>'
        +'<div class="cal-wrap"><div class="cal-grid" id="aGr">'+grid+'</div></div>')
    +'</div>';

  // ── 잠금 ──
  document.getElementById('bLk').addEventListener('click', function(){
    unlocked = false;
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    document.querySelector('[data-tab="schedule"]').classList.add('active');
    tab = 'schedule'; render(); toast('잠겼습니다.');
  });

  // ── 비밀번호 변경 ──
  document.getElementById('bCpw').addEventListener('click', function(){
    var root = document.getElementById('modalRoot');
    root.innerHTML = '<div class="modal-overlay" id="ov"><div class="modal" style="max-width:360px"><h3>&#128273; 비밀번호 변경</h3><div style="display:flex;flex-direction:column;gap:10px;"><div><div style="font-size:12px;color:#6b7280;margin-bottom:4px;">현재 비밀번호</div><input type="password" id="c1" style="width:100%"></div><div><div style="font-size:12px;color:#6b7280;margin-bottom:4px;">새 비밀번호</div><input type="password" id="c2" style="width:100%"></div><div><div style="font-size:12px;color:#6b7280;margin-bottom:4px;">새 비밀번호 확인</div><input type="password" id="c3" style="width:100%"></div></div><div id="ce" style="color:#b91c1c;font-size:12px;margin-top:.5rem;min-height:18px;"></div><div class="modal-btns"><button class="btn ghost" id="mCancel">취소</button><button class="btn primary" id="mOk">변경</button></div></div></div>';
    root.querySelector('#mCancel').addEventListener('click', function(){ root.innerHTML=''; });
    root.querySelector('#ov').addEventListener('click', function(e){ if(e.target.id==='ov') root.innerHTML=''; });
    root.querySelector('#mOk').addEventListener('click', function(){
      var cur=root.querySelector('#c1').value, nw=root.querySelector('#c2').value, cf=root.querySelector('#c3').value, er=root.querySelector('#ce');
      if(cur!==getPW()){ er.textContent='현재 비밀번호가 틀렸습니다.'; return; }
      if(!nw||nw.length<4){ er.textContent='4자 이상 입력해주세요.'; return; }
      if(nw!==cf){ er.textContent='새 비밀번호가 일치하지 않습니다.'; return; }
      setPW(nw); root.innerHTML=''; toast('비밀번호가 변경되었습니다.');
    });
  });

  // ── 불러오기 (Sheets → 달력) ──
  document.getElementById('bLoad').addEventListener('click', async function(){
    var y = +document.getElementById('as_y').value, m = +document.getElementById('as_m').value;
    st.assign.y = y; st.assign.m = m;
    cache.invalidateSchedule(y, m);  // 최신 데이터 강제 로드
    loading();
    var saved = await svc.getSchedule(y, m);
    if (saved.length > 0) {
      store.assignRows = saved;
      store.assignDirty = false;
      toast(y+'년 '+m+'월 배정을 불러왔습니다.');
    } else {
      store.assignRows = [];
      toast('저장된 배정이 없습니다. 자동 배정을 사용하세요.', true);
    }
    render();
  });

  // ── 자동 배정 ──
  document.getElementById('bAuto').addEventListener('click', function(){
    var y = +document.getElementById('as_y').value, m = +document.getElementById('as_m').value;
    st.assign.y = y; st.assign.m = m; store.userExcl = [];
    store.assignRows = autoAssign(y, m);
    store.assignDirty = true;
    render();
  });

  // ── 초기화 ──
  document.getElementById('bClr').addEventListener('click', function(){
    store.assignRows = []; store.userExcl = []; store.assignDirty = false; render();
  });

  // ── 저장 ──
  document.getElementById('bSave').addEventListener('click', async function(){
    if (!store.assignRows.length) return;
    var ok = await svc.saveSchedule(store.assignRows, st.assign.y, st.assign.m, user());
    if (ok) {
      store.assignDirty = false;
      toast(st.assign.y+'년 '+st.assign.m+'월 감독표가 저장되었습니다.');
      render();  // 저장 후 달력 유지 (버튼의 * 제거)
    } else {
      toast('저장 실패', true);
    }
  });

  // ── 드롭다운 변경 ──
  document.querySelectorAll('.asel').forEach(function(sel){
    sel.addEventListener('click',    function(e){ e.stopPropagation(); });
    sel.addEventListener('mousedown',function(e){ e.stopPropagation(); });
    sel.addEventListener('change',   function(e){
      e.stopPropagation();
      var r = store.assignRows.find(function(r){ return r.date === e.target.dataset.ds; });
      if (r) { r.current = e.target.value; r.type = '수동'; store.assignDirty = true; }
    });
  });

  // ── 셀 클릭 → 제외/복구 ──
  var ag = document.getElementById('aGr');
  if (ag) ag.addEventListener('click', function(e){
    if (e.target.tagName==='SELECT' || e.target.tagName==='OPTION') return;
    var cell = e.target.closest('[data-ds]'); if (!cell) return;
    var ds = cell.dataset.ds;
    var r  = store.assignRows.find(function(r){ return r.date===ds; });
    if (!r) return;
    if (r.status === '제외') {
      var ab = store.assignRows.filter(function(x){ return x.status!=='제외' && x.date<ds; }).length;
      var t  = TEACHERS[(store.lastIdx+ab) % TEACHERS.length];
      r.orig=t; r.current=t; r.status='정상'; r.type='수동'; r.note='';
      store.userExcl = store.userExcl.filter(function(x){ return x!==ds; });
    } else {
      r.orig=null; r.current=null; r.status='제외'; r.type='자동'; r.note='배정제외';
      if (store.userExcl.indexOf(ds) < 0) store.userExcl.push(ds);
    }
    store.assignDirty = true;
    render();
  });
}

// ── P3: 교체 관리 ─────────────────────────────────────────

    for(var d=1;d<=total;d++){
      var ds=fmt(s.y,s.m,d), row=byD[ds], dw2=dow(s.y,s.m,d);
      var sat=dw2===6, sun=dw2===0, ex=!row||row.status==='제외';
      var isA=s.selA&&s.selA.date===ds, isB=s.selB&&s.selB.date===ds, ch=row&&row.status==='변경';
      var dd='<div class="cell-d '+(sat?'sat':sun?'sun':'')+'">'+d+'</div>';
      if(sat||sun){g+='<div class="s-cell wknd">'+dd+'<div style="font-size:10px;color:#9ca3af;margin-top:2px;">주말</div></div>';continue;}

      var cls='s-cell normal'; if(isA)cls='s-cell sel-a'; else if(isB)cls='s-cell sel-b'; else if(ch)cls='s-cell normal changed-cell';
      var nc=isA?'color:#1e40af;':isB?'color:#166534;':ch?'color:#1d4ed8;':'color:#111;';
      var tag=isA?'<span class="cell-tag b-changed" style="margin-top:2px;">① 선택됨</span>':isB?'<span class="cell-tag b-normal" style="margin-top:2px;">② 선택됨</span>':ch?'<span class="cell-tag b-changed" style="margin-top:2px;">변경됨</span>':'';
      g+='<div class="'+cls+'" data-ds="'+ds+'">'+dd+'<div style="font-size:12px;font-weight:700;margin-top:2px;'+nc+'">'+(row.current||'')+'</div>'+tag+'</div>';
    }
    grid='<div class="cal-wrap"><div class="cal-grid" id="swG">'+g+'</div></div>';
  }

  document.getElementById('page').innerHTML=
    '<div class="card"><div class="row-controls">'+ysel('sw_y',s.y)+msel('sw_m',s.m)+'<button class="btn sm ghost" id="swR">선택 초기화</button></div>'
    +'<div class="step-bar">'+sA+'<span class="step-arrow">&#8644;</span>'+sB+(s.selA&&s.selB?'<button class="btn sm primary" id="bCfm" style="margin-left:auto">교체 확인</button>':'')+'</div>'
    +'<div class="legend" style="margin-bottom:.75rem"><div class="leg"><div class="leg-dot" style="background:#dbeafe;border:1.5px solid #185FA5"></div>① 선택</div><div class="leg"><div class="leg-dot" style="background:#dcfce7;border:1.5px solid #15803d"></div>② 선택</div><div class="leg"><div class="leg-dot" style="background:#eff6ff;border:1px solid #93c5fd"></div>변경됨</div></div>'
    +grid+'</div>';

  document.getElementById('sw_y').addEventListener('change',function(e){s.y=+e.target.value;s.selA=null;s.selB=null;render();});
  document.getElementById('sw_m').addEventListener('change',function(e){s.m=+e.target.value;s.selA=null;s.selB=null;render();});
  document.getElementById('swR').addEventListener('click',function(){s.selA=null;s.selB=null;render();});

  var sg=document.getElementById('swG');
  if(sg) sg.addEventListener('click',function(e){
    var cell=e.target.closest('[data-ds]'); if(!cell) return;
    var ds=cell.dataset.ds, row=byD[ds]; if(!row||row.status==='제외') return;
    if(!s.selA){s.selA={date:ds,teacher:row.current,dow:row.dow};s.selB=null;}
    else if(s.selA.date===ds){s.selA=null;s.selB=null;}
    else if(!s.selB){
      s.selB={date:ds,teacher:row.current,dow:row.dow};
      if(s.selA.teacher===s.selB.teacher){toast('같은 감독자입니다.',true);s.selB=null;return;}
    } else {s.selA={date:ds,teacher:row.current,dow:row.dow};s.selB=null;}
    render();
  });

  var bcfm=document.getElementById('bCfm');
  if(bcfm) bcfm.addEventListener('click',function(){
    var A=s.selA, B=s.selB;
    modal(
      '<div class="modal"><h3>&#128260; 감독 교체 확인</h3>'
      +'<div class="swap-card"><div class="swap-half from"><div class="swap-label">① 날짜</div><div class="swap-date">'+A.date+'</div><div class="swap-name">'+A.teacher+'</div><div class="swap-dow">'+A.dow+'요일</div></div>'
      +'<div class="swap-half to"><div class="swap-label">② 날짜</div><div class="swap-date">'+B.date+'</div><div class="swap-name">'+B.teacher+'</div><div class="swap-dow">'+B.dow+'요일</div></div></div>'
      +'<div class="swap-arrow-wrap">&#8644; 두 날짜의 감독자를 서로 맞바꿉니다</div>'
      +'<div style="margin-top:.875rem;"><div style="font-size:12px;color:#6b7280;margin-bottom:4px;">교체 사유 (선택)</div><input type="text" id="swRsn" placeholder="예: 출장, 연수" style="width:100%"></div>'
      +'<div class="modal-btns"><button class="btn ghost" id="mCancel">취소</button><button class="btn primary" id="mOk">교체 확정</button></div></div>',
      async function(){
        var rsn=document.getElementById('swRsn')?document.getElementById('swRsn').value:'';
        toast('처리 중...');
        var res=await svc.swapByDate(A.date,B.date,rsn,user());
        if(res&&res.ok){toast('교체가 완료되었습니다.');s.selA=null;s.selB=null;render();}
        else toast((res&&res.msg)||'교체 실패',true);
      }
    );
  });
}

// ── P4: 월별 통계 ─────────────────────────────────────────
async function P4(){
  var s=st.stats; loading();
  var all=await svc.getSchedule(s.y,s.m);
  var rows=all.filter(function(r){return r.status!=='제외';});
  var stats=svc.stats(rows);

  document.getElementById('page').innerHTML=
    '<div class="card"><div class="row-controls">'+ysel('st_y',s.y)+msel('st_m',s.m)+'<button class="btn sm" id="stL">조회</button></div>'
    +(!rows.length?'<div class="info-box">해당 월 데이터가 없습니다.</div>'
      :'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:1.25rem">'
        +[['총 배정 일수',rows.length+'일'],['교체 발생',rows.filter(function(r){return r.status==='변경';}).length+'건'],['감독 인원',TEACHERS.length+'명']].map(function(x){
          return'<div style="background:#f9fafb;border-radius:8px;padding:.875rem"><div style="font-size:11px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:4px">'+x[0]+'</div><div style="font-size:24px;font-weight:700">'+x[1]+'</div></div>';
        }).join('')+'</div>'
        +'<div class="overflow-x"><table><thead><tr><th>이름</th><th>원래 배정</th><th>현재 배정</th><th>빠진 횟수</th><th>추가 횟수</th><th>차이</th></tr></thead><tbody>'
        +stats.map(function(r){var d=r.currCount-r.origCount;return'<tr><td style="font-weight:700">'+r.name+'</td><td>'+r.origCount+'</td><td style="font-weight:600">'+r.currCount+'</td><td style="color:'+(r.removed?'#b91c1c':'#9ca3af')+'">'+r.removed+'</td><td style="color:'+(r.added?'#15803d':'#9ca3af')+'">'+r.added+'</td><td style="font-weight:700;color:'+(d>0?'#15803d':d<0?'#b91c1c':'#9ca3af')+'">'+(d>0?'+':'')+d+'</td></tr>';}).join('')
        +'</tbody></table></div>')
    +'</div>';

  document.getElementById('stL').addEventListener('click',function(){st.stats.y=+document.getElementById('st_y').value;st.stats.m=+document.getElementById('st_m').value;render();});
}

// ── P5: 변경 로그 ─────────────────────────────────────────
async function P5(){
  loading();
  var logs=await svc.getLogs();
  document.getElementById('page').innerHTML=
    '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem"><div style="font-weight:700;font-size:14px">변경 이력</div><span style="font-size:11px;color:#9ca3af">총 '+logs.length+'건</span></div>'
    +(!logs.length?'<div class="info-box">변경 이력이 없습니다.</div>'
      :'<div class="overflow-x"><table><thead><tr><th>변경시간</th><th>유형</th><th>대상</th><th class="hide-m">이전값</th><th>새값</th><th class="hide-m">작업자</th><th class="hide-m">사유</th></tr></thead><tbody>'
        +logs.map(function(l){return'<tr><td style="font-size:11px;white-space:nowrap;color:#6b7280">'+l.time+'</td><td><span class="badge b-'+(l.type==='교체'?'swap':l.type==='월배정'?'auto':'b-normal')+'">'+l.type+'</span></td><td style="font-size:12px">'+l.target+'</td><td class="hide-m" style="color:#9ca3af">'+(l.prev||'–')+'</td><td style="font-weight:600">'+(l.next||'–')+'</td><td class="hide-m" style="font-size:12px">'+(l.user||'–')+'</td><td class="hide-m" style="color:#9ca3af;font-size:12px">'+(l.reason||'–')+'</td></tr>';}).join('')
        +'</tbody></table></div>')
    +'</div>';
}

// ── 초기 실행: 제외일 로드 후 현재 월 데이터 미리 로드 ──────
svc.loadHolidays().then(function(){
  render();
  // 백그라운드에서 현재 탭 데이터 미리 캐싱
  var now = new Date();
  var y = st.schedule.y, m = st.schedule.m;
  svc.getSchedule(y, m);   // 백그라운드 프리페치
  svc.getLogs();            // 로그도 미리 로드
});
</script>
